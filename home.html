<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBTI 交友大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* 导航栏 - 三个按钮分布 */
        .nav-bar {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            pointer-events: none;
        }

        .nav-left {
            width: 100px;
        }

        .nav-center {
            pointer-events: auto;
        }

        .nav-right {
            pointer-events: auto;
        }

        .nav-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.35);
            transform: scale(1.05);
        }

        /* 顶部标题 */
        .header {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 50;
            pointer-events: none;
        }

        .header h1 {
            color: #fff;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            letter-spacing: 8px;
        }

        /* 选择聊天室弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 30px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h2 {
            color: #3a3a6a;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .modal p {
            color: #6a6a9a;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .modal-planet-name {
            color: #6080ff;
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .room-options {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .room-option {
            flex: 1;
            padding: 20px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .room-option:hover {
            transform: translateY(-3px);
        }

        .room-option.flower {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe0f0 50%, #f0e0ff 100%);
            border-color: rgba(255, 150, 200, 0.4);
        }

        .room-option.flower:hover {
            border-color: #ff80b0;
            box-shadow: 0 10px 30px rgba(255, 128, 176, 0.3);
        }

        .room-option.ocean {
            background: linear-gradient(135deg, #e0f0ff 0%, #b0e0ff 50%, #90c0ff 100%);
            border-color: rgba(100, 180, 255, 0.4);
        }

        .room-option.ocean:hover {
            border-color: #60a0ff;
            box-shadow: 0 10px 30px rgba(96, 160, 255, 0.3);
        }

        .room-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .room-name {
            color: #3a3a6a;
            font-weight: 700;
            font-size: 15px;
        }

        .cancel-btn {
            background: rgba(100,100,120,0.1);
            border: none;
            color: #6a6a8a;
            padding: 12px 30px;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .cancel-btn:hover {
            background: rgba(100,100,120,0.2);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.3rem;
                letter-spacing: 4px;
            }
            .nav-btn {
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-layer">
        <!-- 导航栏 -->
        <div class="nav-bar">
            <div class="nav-left"></div>
            <div class="nav-center">
                <a href="friend.html" class="nav-btn">👥 交友云</a>
            </div>
            <div class="nav-right">
                <a href="profile.html" class="nav-btn">👤 个人中心</a>
            </div>
        </div>

        <!-- 标题 -->
        <div class="header">
            <h1>MBTI 交友大厅</h1>
        </div>
    </div>

    <!-- 选择聊天室弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>选择聊天室</h2>
            <p>你要进入哪个房间？</p>
            <div class="modal-planet-name" id="modalPlanetName"></div>
            <div class="room-options">
                <div class="room-option flower" id="flowerOption">
                    <div class="room-icon">🌷</div>
                    <div class="room-name">花田聊天室</div>
                </div>
                <div class="room-option ocean" id="oceanOption">
                    <div class="room-icon">🌊</div>
                    <div class="room-name">海水聊天室</div>
                </div>
            </div>
            <button class="cancel-btn" id="cancelBtn">取消</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let planets = [];
        let particles;
        let time = 0;
        let cameraZoom = 1;
        let cameraOffsetX = 0, cameraOffsetZ = 0;
        let isDragging = false, isPinching = false;
        let lastMouseX = 0, lastMouseY = 0;
        let initialPinchDistance = 0, initialCameraZoom = 1;
        let raycaster, mouse;
        let selectedPlanet = null;

        const planetsData = [
            { type: 'INTJ', name: 'INTJ', title: '战略家 · 暗核智慧', color: 0x6b3fa0, size: 1.0 },
            { type: 'INTP', name: 'INTP', title: '逻辑家 · 星尘脑洞', color: 0x80b0e0, size: 0.9 },
            { type: 'ENTJ', name: 'ENTJ', title: '统帅 · 气场全开', color: 0xffb020, size: 1.1 },
            { type: 'ENTP', name: 'ENTP', title: '辩论家 · 脑洞无限', color: 0xd0ff80, size: 0.9 },
            { type: 'INFJ', name: 'INFJ', title: '洞察者 · 温柔共情', color: 0xffd0e0, size: 0.95 },
            { type: 'INFP', name: 'INFP', title: '理想家 · 幻梦琉璃', color: 0xe0b0ff, size: 0.9 },
            { type: 'ENFJ', name: 'ENFJ', title: '引导者 · 温暖包容', color: 0xa0d0ff, size: 1.0 },
            { type: 'ENFP', name: 'ENFP', title: '逐梦者 · 热情向阳', color: 0xffb060, size: 1.05 },
            { type: 'ISTJ', name: 'ISTJ', title: '检查者 · 青岩秩序', color: 0x507050, size: 1.0 },
            { type: 'ESTJ', name: 'ESTJ', title: '管理者 · 规则至上', color: 0xa070e0, size: 1.05 },
            { type: 'ISFJ', name: 'ISFJ', title: '守卫者 · 奶白守护', color: 0xf0e0c0, size: 0.95 },
            { type: 'ESFJ', name: 'ESFJ', title: '执政官 · 暖心社交', color: 0xa0d0ff, size: 1.0 },
            { type: 'ISTP', name: 'ISTP', title: '鉴赏家 · 银械工匠', color: 0x808090, size: 0.95 },
            { type: 'ISFP', name: 'ISFP', title: '探险家 · 薄荷艺术', color: 0xb0f0d0, size: 0.9 },
            { type: 'ESTP', name: 'ESTP', title: '企业家 · 赤焰冒险', color: 0xff6040, size: 1.0 },
            { type: 'ESFP', name: 'ESFP', title: '表演者 · 派对中心', color: 0xff80c0, size: 1.1 }
        ];

        function initThree() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 3, 15);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const spaceGeometry = new THREE.SphereGeometry(50, 64, 64);
            const spaceMaterial = new THREE.MeshBasicMaterial({
                side: THREE.BackSide,
                color: 0x2d1b4e
            });
            const space = new THREE.Mesh(spaceGeometry, spaceMaterial);
            scene.add(space);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            createStars();
            createPlanets();

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('wheel', onWheel, { passive: true });
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
            renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
            renderer.domElement.addEventListener('touchend', onTouchEnd);
            renderer.domElement.addEventListener('click', onClick);

            animate();
        }

        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starCount = 1000;
            const positions = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 80;
                positions[i + 1] = (Math.random() - 0.5) * 80;
                positions[i + 2] = (Math.random() - 0.5) * 80;
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.15,
                transparent: true,
                opacity: 0.8
            });
            particles = new THREE.Points(starsGeometry, starsMaterial);
            particles.name = 'particles';
            scene.add(particles);
        }

        function createPlanets() {
            const radius = 8;
            planetsData.forEach((data, i) => {
                const angle = (i / planetsData.length) * Math.PI * 2;
                const geometry = new THREE.SphereGeometry(data.size, 32, 32);
                const material = new THREE.MeshStandardMaterial({
                    color: data.color,
                    roughness: 0.5,
                    metalness: 0.3,
                    emissive: data.color,
                    emissiveIntensity: 0.2
                });

                const planet = new THREE.Mesh(geometry, material);
                planet.position.x = Math.cos(angle) * radius;
                planet.position.z = Math.sin(angle) * radius;
                planet.position.y = Math.sin(i * 0.5) * 1.5;
                planet.userData = { data: data, angle: angle, originalY: planet.position.y };

                const glowGeometry = new THREE.SphereGeometry(data.size * 1.3, 32, 32);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: data.color,
                    transparent: true,
                    opacity: 0.15,
                    side: THREE.BackSide
                });
                const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                planet.add(glow);

                planets.push(planet);
                scene.add(planet);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            planets.forEach((planet, i) => {
                const speed = 0.2 + i * 0.02;
                planet.userData.angle += 0.002;
                planet.position.x = Math.cos(planet.userData.angle) * 8;
                planet.position.z = Math.sin(planet.userData.angle) * 8;
                planet.position.y = planet.userData.originalY + Math.sin(time * 1.5 + i) * 0.5;
                planet.rotation.y += 0.01;
            });

            if (particles) {
                particles.rotation.y += 0.0003;
            }

            updateCamera();
            renderer.render(scene, camera);
        }

        function updateCamera() {
            camera.position.set(cameraOffsetX, 3 / cameraZoom, 15 / cameraZoom + cameraOffsetZ);
            camera.lookAt(cameraOffsetX, 0, cameraOffsetZ);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onWheel(e) {
            cameraZoom = Math.max(0.5, Math.min(3, cameraZoom - e.deltaY * 0.001));
        }

        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function onMouseDown(e) {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        }

        function onMouseMove(e) {
            if (!isDragging || isPinching) return;

            const deltaX = (e.clientX - lastMouseX) * 0.03 / cameraZoom;
            const deltaY = (e.clientY - lastMouseY) * 0.03 / cameraZoom;

            cameraOffsetX -= deltaX;
            cameraOffsetZ -= deltaY;

            cameraOffsetX = Math.max(-10, Math.min(10, cameraOffsetX));
            cameraOffsetZ = Math.max(-10, Math.min(10, cameraOffsetZ));

            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onTouchStart(e) {
            if (e.touches.length === 2) {
                isPinching = true;
                isDragging = false;
                initialPinchDistance = getTouchDistance(e.touches);
                initialCameraZoom = cameraZoom;
            } else if (e.touches.length === 1) {
                onMouseDown({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
            }
        }

        function onTouchMove(e) {
            if (e.touches.length === 2 && isPinching) {
                e.preventDefault();
                const currentDistance = getTouchDistance(e.touches);
                const scale = currentDistance / initialPinchDistance;
                cameraZoom = Math.max(0.5, Math.min(3, initialCameraZoom * scale));
            } else if (e.touches.length === 1) {
                onMouseMove({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
            }
        }

        function onTouchEnd(e) {
            if (e.touches.length < 2) {
                isPinching = false;
            }
            if (e.touches.length === 0) {
                isDragging = false;
            }
        }

        function onClick(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets);

            if (intersects.length > 0) {
                const planet = intersects[0].object;
                while (planet.parent && planet.parent !== scene) {
                    planet.parent.userData.data && (planet.userData = planet.parent.userData);
                    planet.parent.userData.data && (planet = planet.parent);
                }
                if (planet.userData && planet.userData.data) {
                    openModal(planet.userData.data);
                }
            }
        }

        function openModal(planetData) {
            selectedPlanet = planetData;
            document.getElementById('modalPlanetName').textContent = planetData.name + ' ' + planetData.title;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            selectedPlanet = null;
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function enterChat(roomType) {
            if (!selectedPlanet) return;
            const mbti = selectedPlanet.name.toUpperCase();
            if (roomType === 'flower') {
                window.location.href = `chat-flower.html?mbti=${mbti}`;
            } else {
                window.location.href = `chat-ocean.html?mbti=${mbti}`;
            }
        }

        document.getElementById('flowerOption').addEventListener('click', () => enterChat('flower'));
        document.getElementById('oceanOption').addEventListener('click', () => enterChat('ocean'));
        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });

        initThree();
    </script>
</body>
</html>
