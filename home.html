<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 交友大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: radial-gradient(ellipse at center, #2a1a4a 0%, #1a0a2a 50%, #0a0515 100%);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .header h1 {
            color: #fff;
            font-size: 2rem;
            text-shadow: 0 0 30px rgba(180, 150, 255, 0.8);
            letter-spacing: 10px;
            font-weight: 300;
        }

        /* 底部导航栏 - QQ风格 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(20, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(100, 80, 150, 0.3);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #8a8aa0;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(120, 100, 180, 0.15);
        }

        .nav-item.active {
            color: #b090ff;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #b090ff, transparent);
            border-radius: 0 0 3px 3px;
        }

        .nav-item-icon {
            font-size: 22px;
            margin-bottom: 3px;
        }

        .nav-item-text {
            font-size: 11px;
            font-weight: 500;
        }

        /* 点击提示 */
        .click-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 180, 255, 0.7);
            font-size: 13px;
            z-index: 100;
            text-align: center;
            animation: pulse-hint 2s infinite ease-in-out;
        }

        @keyframes pulse-hint {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="header">
        <h1>MBTI 星球交友</h1>
    </div>

    <div class="click-hint">✨ 点击星球进入聊天室 ✨</div>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active">
            <span class="nav-item-icon">🌍</span>
            <span class="nav-item-text">星球大厅</span>
        </a>
        <a href="friend.html" class="nav-item">
            <span class="nav-item-icon">👥</span>
            <span class="nav-item-text">交友云</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-item-icon">👤</span>
            <span class="nav-item-text">个人中心</span>
        </a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let planets = [];
        let labels = [];
        let selectedPlanet = null;
        let time = 0;

        const planetData = [
            { type: 'INTJ', name: '战略家', color: 0x8040d0, glowColor: 0xa060ff, orbitRadius: 16, orbitSpeed: 0.0008, rotationSpeed: 0.008, size: 1.4 },
            { type: 'INTP', name: '逻辑家', color: 0x60a0d0, glowColor: 0x80c0ff, orbitRadius: 16, orbitSpeed: 0.0009, rotationSpeed: 0.010, size: 1.3 },
            { type: 'ENTJ', name: '统帅', color: 0xffa020, glowColor: 0xffc040, orbitRadius: 12, orbitSpeed: 0.0012, rotationSpeed: 0.012, size: 1.5 },
            { type: 'ENTP', name: '辩论家', color: 0x80e080, glowColor: 0xa0ffa0, orbitRadius: 12, orbitSpeed: 0.0011, rotationSpeed: 0.011, size: 1.25 },
            { type: 'INFJ', name: '洞察者', color: 0xe080b0, glowColor: 0xffa0d0, orbitRadius: 16, orbitSpeed: 0.00085, rotationSpeed: 0.009, size: 1.35 },
            { type: 'INFP', name: '理想家', color: 0xb080ff, glowColor: 0xc0a0ff, orbitRadius: 16, orbitSpeed: 0.00075, rotationSpeed: 0.007, size: 1.3 },
            { type: 'ENFJ', name: '引导者', color: 0x60b0e0, glowColor: 0x80d0ff, orbitRadius: 12, orbitSpeed: 0.0010, rotationSpeed: 0.010, size: 1.4 },
            { type: 'ENFP', name: '逐梦者', color: 0xff9050, glowColor: 0xffb070, orbitRadius: 12, orbitSpeed: 0.0013, rotationSpeed: 0.013, size: 1.45 },
            { type: 'ISTJ', name: '检查者', color: 0x508050, glowColor: 0x70a070, orbitRadius: 16, orbitSpeed: 0.0007, rotationSpeed: 0.006, size: 1.3 },
            { type: 'ESTJ', name: '管理者', color: 0x8050c0, glowColor: 0xa070e0, orbitRadius: 16, orbitSpeed: 0.00095, rotationSpeed: 0.0095, size: 1.35 },
            { type: 'ISFJ', name: '守卫者', color: 0xd0c0a0, glowColor: 0xe0d0b0, orbitRadius: 12, orbitSpeed: 0.0008, rotationSpeed: 0.008, size: 1.25 },
            { type: 'ESFJ', name: '执政官', color: 0xff90c0, glowColor: 0xffb0d0, orbitRadius: 12, orbitSpeed: 0.00115, rotationSpeed: 0.0115, size: 1.4 },
            { type: 'ISTP', name: '鉴赏家', color: 0x808090, glowColor: 0xa0a0b0, orbitRadius: 16, orbitSpeed: 0.00088, rotationSpeed: 0.0088, size: 1.25 },
            { type: 'ISFP', name: '探险家', color: 0x60c0a0, glowColor: 0x80e0c0, orbitRadius: 16, orbitSpeed: 0.00078, rotationSpeed: 0.0078, size: 1.2 },
            { type: 'ESTP', name: '企业家', color: 0xff5030, glowColor: 0xff7050, orbitRadius: 8, orbitSpeed: 0.0015, rotationSpeed: 0.015, size: 1.35 },
            { type: 'ESFP', name: '表演者', color: 0xe040a0, glowColor: 0xff60c0, orbitRadius: 8, orbitSpeed: 0.0016, rotationSpeed: 0.016, size: 1.5 }
        ];

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 30);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const pointLight1 = new THREE.PointLight(0x8060ff, 0.8, 100);
            pointLight1.position.set(-20, 10, -20);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0xff60a0, 0.6, 100);
            pointLight2.position.set(20, 5, -10);
            scene.add(pointLight2);

            createStarfield();
            createPlanets();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onClick);

            animate();
        }

        function createStarfield() {
            const starsGeometry = new THREE.BufferGeometry();
            const starCount = 2000;
            const positions = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 200;
                positions[i + 1] = (Math.random() - 0.5) * 200;
                positions[i + 2] = (Math.random() - 0.5) * 200;
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.15,
                transparent: true,
                opacity: 0.8
            });

            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        function createPlanetTexture(color) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createLinearGradient(0, 0, 0, 256);
            const baseColor = new THREE.Color(color);
            const lighter = baseColor.clone().multiplyScalar(1.5);
            const darker = baseColor.clone().multiplyScalar(0.5);

            gradient.addColorStop(0, '#' + lighter.getHexString());
            gradient.addColorStop(0.5, '#' + baseColor.getHexString());
            gradient.addColorStop(1, '#' + darker.getHexString());

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 256);

            ctx.globalAlpha = 0.15;
            for (let i = 0; i < 20; i++) {
                const x = Math.random() * 512;
                const y = Math.random() * 256;
                const r = 20 + Math.random() * 60;
                const patchGradient = ctx.createRadialGradient(x, y, 0, x, y, r);
                patchGradient.addColorStop(0, 'rgba(255,255,255,0.3)');
                patchGradient.addColorStop(1, 'rgba(0,0,0,0.1)');
                ctx.fillStyle = patchGradient;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }

            return new THREE.CanvasTexture(canvas);
        }

        function createPlanets() {
            planetData.forEach((data, index) => {
                const angle = (index / planetData.length) * Math.PI * 2;
                const startAngle = angle;

                const group = new THREE.Group();

                const geometry = new THREE.SphereGeometry(data.size, 64, 64);
                const material = new THREE.MeshStandardMaterial({
                    map: createPlanetTexture(data.color),
                    metalness: 0.3,
                    roughness: 0.7
                });

                const planet = new THREE.Mesh(geometry, material);
                planet.userData = { ...data, startAngle, index };
                planet.castShadow = true;
                group.add(planet);

                const glowGeometry = new THREE.SphereGeometry(data.size * 1.2, 32, 32);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: data.glowColor,
                    transparent: true,
                    opacity: 0.15,
                    side: THREE.BackSide
                });
                const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                group.add(glow);

                planets.push(group);
                scene.add(group);
            });
        }

        function getOnlineCount() {
            try {
                const accounts = JSON.parse(localStorage.getItem('mbtiAccounts') || '[]');
                return Math.max(1, accounts.length);
            } catch (e) {
                return 1;
            }
        }

        function updateLabels() {
            labels.forEach(label => label.remove());
            labels = [];

            planets.forEach((group, index) => {
                const planet = group.children[0];
                const data = planet.userData;

                const vector = new THREE.Vector3();
                planet.getWorldPosition(vector);
                vector.project(camera);

                if (vector.z < 1) {
                    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;

                    const label = document.createElement('div');
                    label.style.cssText = `
                        position: fixed;
                        left: ${x}px;
                        top: ${y - 60}px;
                        transform: translateX(-50%);
                        background: rgba(20, 10, 40, 0.85);
                        backdrop-filter: blur(10px);
                        padding: 8px 14px;
                        border-radius: 12px;
                        border: 1px solid rgba(150, 120, 200, 0.4);
                        color: white;
                        font-size: 12px;
                        text-align: center;
                        pointer-events: none;
                        z-index: 100;
                        white-space: nowrap;
                    `;
                    const onlineCount = getOnlineCount();
                    label.innerHTML = `
                        <div style="font-weight: bold; font-size: 14px; color: #c0a0ff;">${data.type}</div>
                        <div style="font-size: 11px; color: #aaa; margin: 2px 0;">${data.name}</div>
                        <div style="font-size: 11px; color: #80ff80;">在线 ${onlineCount} 人</div>
                    `;
                    document.body.appendChild(label);
                    labels.push(label);
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        let mouseX = 0, mouseY = 0;

        function onMouseMove(e) {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onClick(e) {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(mouseX, mouseY), camera);

            const planetMeshes = planets.map(group => group.children[0]);
            const intersects = raycaster.intersectObjects(planetMeshes);

            if (intersects.length > 0) {
                const planet = intersects[0].object;
                const data = planet.userData;
                window.location.href = `chat-ocean.html?mbti=${data.type}`;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            planets.forEach((group, index) => {
                const planet = group.children[0];
                const data = planet.userData;

                const angle = data.startAngle + time * data.orbitSpeed * 10;
                const x = Math.cos(angle) * data.orbitRadius;
                const z = Math.sin(angle) * data.orbitRadius;
                const y = Math.sin(time * 0.5 + index) * 0.5;

                group.position.set(x, y, z);

                planet.rotation.y += data.rotationSpeed;
            });

            camera.position.x = mouseX * 2;
            camera.position.y = 12 + mouseY * 2;
            camera.lookAt(0, 0, 0);

            updateLabels();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
