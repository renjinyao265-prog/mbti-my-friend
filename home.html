<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 交友大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            touch-action: none;
        }

        /* 背景层 */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #3d2066 0%, #2a1547 30%, #1a0a2e 70%, #0d051a 100%);
            z-index: 0;
        }

        /* 星光粒子 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 顶部标题 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .header h1 {
            color: #fff;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            letter-spacing: 8px;
        }

        /* 缩放控制 */
        .zoom-controls {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .zoom-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        /* 星球容器 - 可缩放平移 */
        .planets-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            overflow: hidden;
        }

        .planets-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }

        /* 轨道 */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1px dashed rgba(255,255,255,0.1);
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        /* 星球基础样式 */
        .planet-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
        }

        .planet {
            position: absolute;
            cursor: pointer;
            transition: box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }

        .planet:hover {
            z-index: 50;
        }

        .planet-label {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            color: #fff;
            font-size: 12px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .planet:hover .planet-label {
            opacity: 1;
        }

        /* ============ 3D 星球样式 ============ */

        /* 通用 3D 效果 */
        .planet-3d {
            position: relative;
            border-radius: 50%;
            transform-style: preserve-3d;
        }

        .planet-3d::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 20%, transparent 50%, rgba(0,0,0,0.3) 80%, rgba(0,0,0,0.5) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .planet-3d::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 15%;
            width: 25%;
            height: 20%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
        }

        /* NT 分析家组 - 紫/蓝调 */

        .planet.intj .planet-3d {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #b070ff 0%, #8040d0 30%, #502090 60%, #301060 100%);
            box-shadow:
                0 0 30px rgba(128, 64, 208, 0.6),
                inset -10px -10px 20px rgba(0,0,0,0.4),
                inset 5px 5px 15px rgba(255,255,255,0.2);
            animation: spin-slow 20s infinite linear;
        }

        .planet.intj:hover {
            filter: drop-shadow(0 0 40px rgba(160, 96, 255, 0.9));
        }

        .planet.intp .planet-3d {
            width: 75px;
            height: 75px;
            background: radial-gradient(circle at 35% 35%, #e0f0ff 0%, #a0d0ff 30%, #60a0d0 60%, #3070a0 100%);
            box-shadow:
                0 0 28px rgba(96, 160, 208, 0.6),
                inset -8px -8px 18px rgba(0,0,0,0.35),
                inset 5px 5px 12px rgba(255,255,255,0.25);
            animation: spin-medium 15s infinite linear;
        }

        .planet.intp:hover {
            filter: drop-shadow(0 0 35px rgba(128, 192, 255, 0.9));
        }

        .planet.entj .planet-3d {
            width: 85px;
            height: 85px;
            background: radial-gradient(circle at 30% 30%, #fff0b0 0%, #ffc040 30%, #ff9020 60%, #d06000 100%);
            box-shadow:
                0 0 35px rgba(255, 144, 32, 0.7),
                inset -12px -12px 25px rgba(0,0,0,0.4),
                inset 6px 6px 18px rgba(255,255,255,0.25);
            animation: spin-fast 12s infinite linear;
        }

        .planet.entj:hover {
            filter: drop-shadow(0 0 50px rgba(255, 160, 40, 1));
        }

        .planet.entp .planet-3d {
            width: 72px;
            height: 72px;
            background: radial-gradient(circle at 30% 30%, #ffffc0 0%, #d0ff80 30%, #80ffb0 60%, #40d080 100%);
            box-shadow:
                0 0 28px rgba(128, 255, 176, 0.6),
                inset -8px -8px 18px rgba(0,0,0,0.3),
                inset 5px 5px 12px rgba(255,255,255,0.3);
            animation: spin-medium 14s infinite linear;
        }

        .planet.entp:hover {
            filter: drop-shadow(0 0 40px rgba(160, 255, 180, 0.9));
        }

        /* NF 外交家组 - 粉/暖调 */

        .planet.infj .planet-3d {
            width: 78px;
            height: 78px;
            background: radial-gradient(circle at 30% 30%, #fff5fa 0%, #ffd0e5 30%, #e8a0c5 60%, #c070a0 100%);
            box-shadow:
                0 0 30px rgba(255, 160, 200, 0.6),
                inset -9px -9px 20px rgba(0,0,0,0.3),
                inset 5px 5px 14px rgba(255,255,255,0.25);
            animation: spin-slow 22s infinite linear;
        }

        .planet.infj:hover {
            filter: drop-shadow(0 0 40px rgba(255, 180, 210, 0.9));
        }

        .planet.infp .planet-3d {
            width: 73px;
            height: 73px;
            background: radial-gradient(circle at 35% 35%, #fff0ff 0%, #e0b0ff 30%, #c090ff 60%, #a060d0 100%);
            box-shadow:
                0 0 28px rgba(208, 160, 255, 0.6),
                inset -8px -8px 18px rgba(0,0,0,0.3),
                inset 5px 5px 12px rgba(255,255,255,0.25);
            animation: spin-slow 25s infinite linear;
        }

        .planet.infp:hover {
            filter: drop-shadow(0 0 40px rgba(220, 180, 255, 0.9));
        }

        .planet.enfj .planet-3d {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #f0ffff 0%, #b0e0ff 30%, #70b0e0 60%, #4080b0 100%);
            box-shadow:
                0 0 32px rgba(112, 176, 224, 0.6),
                inset -10px -10px 22px rgba(0,0,0,0.35),
                inset 6px 6px 15px rgba(255,255,255,0.25);
            animation: spin-medium 18s infinite linear;
        }

        .planet.enfj:hover {
            filter: drop-shadow(0 0 45px rgba(140, 200, 255, 0.9));
        }

        .planet.enfp .planet-3d {
            width: 82px;
            height: 82px;
            background: radial-gradient(circle at 30% 30%, #fff0e0 0%, #ffc080 30%, #ff9050 60%, #e06030 100%);
            box-shadow:
                0 0 35px rgba(255, 144, 80, 0.7),
                inset -10px -10px 22px rgba(0,0,0,0.35),
                inset 6px 6px 15px rgba(255,255,255,0.25);
            animation: spin-fast 11s infinite linear;
        }

        .planet.enfp:hover {
            filter: drop-shadow(0 0 50px rgba(255, 160, 100, 1));
        }

        /* SJ 守护者组 - 绿/沉稳调 */

        .planet.istj .planet-3d {
            width: 76px;
            height: 76px;
            background: radial-gradient(circle at 30% 30%, #b0d0b0 0%, #70a070 30%, #508050 60%, #306030 100%);
            box-shadow:
                0 0 26px rgba(112, 160, 112, 0.6),
                inset -8px -8px 18px rgba(0,0,0,0.35),
                inset 5px 5px 12px rgba(255,255,255,0.15);
            animation: spin-slow 28s infinite linear;
        }

        .planet.istj:hover {
            filter: drop-shadow(0 0 38px rgba(140, 200, 140, 0.9));
        }

        .planet.estj .planet-3d {
            width: 79px;
            height: 79px;
            background: radial-gradient(circle at 30% 30%, #e0d0ff 0%, #b080ff 30%, #8050d0 60%, #6030a0 100%);
            box-shadow:
                0 0 30px rgba(128, 80, 208, 0.6),
                inset -9px -9px 20px rgba(0,0,0,0.35),
                inset 5px 5px 14px rgba(255,255,255,0.2);
            animation: spin-medium 17s infinite linear;
        }

        .planet.estj:hover {
            filter: drop-shadow(0 0 42px rgba(160, 110, 255, 0.9));
        }

        .planet.isfj .planet-3d {
            width: 75px;
            height: 75px;
            background: radial-gradient(circle at 30% 30%, #fffff0 0%, #f0e0c0 30%, #e0d0a0 60%, #c0b080 100%);
            box-shadow:
                0 0 28px rgba(224, 208, 160, 0.6),
                inset -8px -8px 18px rgba(0,0,0,0.3),
                inset 5px 5px 12px rgba(255,255,255,0.3);
            animation: spin-slow 24s infinite linear;
        }

        .planet.isfj:hover {
            filter: drop-shadow(0 0 40px rgba(240, 220, 180, 0.9));
        }

        .planet.esfj .planet-3d {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #fff5ff 0%, #ffd0f0 30%, #ffb0e0 60%, #f090c0 100%);
            box-shadow:
                0 0 32px rgba(255, 176, 224, 0.65),
                inset -10px -10px 22px rgba(0,0,0,0.3),
                inset 6px 6px 15px rgba(255,255,255,0.25);
            animation: spin-medium 16s infinite linear;
        }

        .planet.esfj:hover {
            filter: drop-shadow(0 0 45px rgba(255, 180, 230, 0.95));
        }

        /* SP 探险家组 - 亮/艳调 */

        .planet.istp .planet-3d {
            width: 72px;
            height: 72px;
            background: radial-gradient(circle at 30% 30%, #e8e8e8 0%, #b0b0c0 30%, #808090 60%, #505060 100%);
            box-shadow:
                0 0 26px rgba(160, 160, 176, 0.6),
                inset -8px -8px 18px rgba(0,0,0,0.35),
                inset 5px 5px 12px rgba(255,255,255,0.2);
            animation: spin-medium 15s infinite linear;
        }

        .planet.istp:hover {
            filter: drop-shadow(0 0 38px rgba(180, 180, 200, 0.9));
        }

        .planet.isfp .planet-3d {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #e0fff0 0%, #a0f0d0 30%, #70d0b0 60%, #40b090 100%);
            box-shadow:
                0 0 26px rgba(112, 208, 176, 0.6),
                inset -7px -7px 16px rgba(0,0,0,0.3),
                inset 5px 5px 10px rgba(255,255,255,0.25);
            animation: spin-slow 26s infinite linear;
        }

        .planet.isfp:hover {
            filter: drop-shadow(0 0 38px rgba(160, 240, 200, 0.9));
        }

        .planet.estp .planet-3d {
            width: 78px;
            height: 78px;
            background: radial-gradient(circle at 30% 30%, #fff0a0 0%, #ff8040 30%, #ff5020 60%, #d03010 100%);
            box-shadow:
                0 0 32px rgba(255, 128, 64, 0.7),
                inset -9px -9px 20px rgba(0,0,0,0.35),
                inset 6px 6px 14px rgba(255,255,255,0.2);
            animation: spin-fast 10s infinite linear;
        }

        .planet.estp:hover {
            filter: drop-shadow(0 0 48px rgba(255, 140, 80, 1));
        }

        .planet.esfp .planet-3d {
            width: 85px;
            height: 85px;
            background: radial-gradient(circle at 30% 30%, #fff0ff 0%, #ff80d0 30%, #e050a0 60%, #b03080 100%);
            box-shadow:
                0 0 38px rgba(255, 128, 208, 0.75),
                inset -12px -12px 26px rgba(0,0,0,0.4),
                inset 7px 7px 18px rgba(255,255,255,0.25);
            animation: spin-fast 9s infinite linear;
        }

        .planet.esfp:hover {
            filter: drop-shadow(0 0 55px rgba(255, 140, 220, 1));
        }

        /* 动画关键帧 */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-medium {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-fast {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes orbit-slow {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes orbit-medium {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes orbit-fast {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
        }

        .nav-item {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #8a8a9a;
        }

        .nav-item:hover {
            background: rgba(96, 160, 255, 0.1);
        }

        .nav-item.active {
            color: #6080ff;
        }

        .nav-item-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .nav-item-text {
            font-size: 12px;
            font-weight: 600;
        }

        /* 选择聊天室弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding-bottom: 70px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 30px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h2 {
            color: #3a3a6a;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .modal p {
            color: #6a6a9a;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .modal-planet-name {
            color: #6080ff;
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .room-options {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .room-option {
            flex: 1;
            padding: 20px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .room-option:hover {
            transform: translateY(-3px);
        }

        .room-option.flower {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe0f0 50%, #f0e0ff 100%);
            border-color: rgba(255, 150, 200, 0.4);
        }

        .room-option.flower:hover {
            border-color: #ff80b0;
            box-shadow: 0 10px 30px rgba(255, 128, 176, 0.3);
        }

        .room-option.ocean {
            background: linear-gradient(135deg, #e0f0ff 0%, #b0e0ff 50%, #90c0ff 100%);
            border-color: rgba(100, 180, 255, 0.4);
        }

        .room-option.ocean:hover {
            border-color: #60a0ff;
            box-shadow: 0 10px 30px rgba(96, 160, 255, 0.3);
        }

        .room-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .room-name {
            color: #3a3a6a;
            font-weight: 700;
            font-size: 15px;
        }

        .cancel-btn {
            background: rgba(100,100,120,0.1);
            border: none;
            color: #6a6a8a;
            padding: 12px 30px;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .cancel-btn:hover {
            background: rgba(100,100,120,0.2);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.3rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="space-bg" id="spaceBg"></div>

    <div class="header">
        <h1>MBTI 交友大厅</h1>
    </div>

    <!-- 缩放控制 -->
    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomIn">+</button>
        <button class="zoom-btn" id="zoomOut">−</button>
    </div>

    <div class="planets-wrapper" id="planetsWrapper">
        <div class="planets-container" id="planetsContainer"></div>
    </div>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active">
            <span class="nav-item-icon">🌍</span>
            <span class="nav-item-text">星球大厅</span>
        </a>
        <a href="friend.html" class="nav-item">
            <span class="nav-item-icon">👥</span>
            <span class="nav-item-text">交友云</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-item-icon">👤</span>
            <span class="nav-item-text">个人中心</span>
        </a>
    </nav>

    <!-- 选择聊天室弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>选择聊天室</h2>
            <p>你要进入哪个房间？</p>
            <div class="modal-planet-name" id="modalPlanetName"></div>
            <div class="room-options">
                <div class="room-option flower" id="flowerOption">
                    <div class="room-icon">🌷</div>
                    <div class="room-name">花田聊天室</div>
                </div>
                <div class="room-option ocean" id="oceanOption">
                    <div class="room-icon">🌊</div>
                    <div class="room-name">海水聊天室</div>
                </div>
            </div>
            <button class="cancel-btn" id="cancelBtn">取消</button>
        </div>
    </div>

    <script>
        const planetsData = [
            { type: 'intj', name: 'INTJ', title: '战略家', orbitRadius: 190, orbitSpeed: 'slow', startAngle: 0 },
            { type: 'intp', name: 'INTP', title: '逻辑家', orbitRadius: 190, orbitSpeed: 'slow', startAngle: 22.5 },
            { type: 'entj', name: 'ENTJ', title: '统帅', orbitRadius: 150, orbitSpeed: 'medium', startAngle: 45 },
            { type: 'entp', name: 'ENTP', title: '辩论家', orbitRadius: 150, orbitSpeed: 'medium', startAngle: 67.5 },
            { type: 'infj', name: 'INFJ', title: '洞察者', orbitRadius: 190, orbitSpeed: 'slow', startAngle: 90 },
            { type: 'infp', name: 'INFP', title: '理想家', orbitRadius: 190, orbitSpeed: 'slow', startAngle: 112.5 },
            { type: 'enfj', name: 'ENFJ', title: '引导者', orbitRadius: 150, orbitSpeed: 'medium', startAngle: 135 },
            { type: 'enfp', name: 'ENFP', title: '逐梦者', orbitRadius: 150, orbitSpeed: 'medium', startAngle: 157.5 },
            { type: 'istj', name: 'ISTJ', title: '检查者', orbitRadius: 190, orbitSpeed: 'slow', startAngle: 180 },
            { type: 'estj', name: 'ESTJ', title: '管理者', orbitRadius: 190, orbitSpeed: 'slow', startAngle: 202.5 },
            { type: 'isfj', name: 'ISFJ', title: '守卫者', orbitRadius: 150, orbitSpeed: 'medium', startAngle: 225 },
            { type: 'esfj', name: 'ESFJ', title: '执政官', orbitRadius: 150, orbitSpeed: 'medium', startAngle: 247.5 },
            { type: 'istp', name: 'ISTP', title: '鉴赏家', orbitRadius: 190, orbitSpeed: 'slow', startAngle: 270 },
            { type: 'isfp', name: 'ISFP', title: '探险家', orbitRadius: 190, orbitSpeed: 'slow', startAngle: 292.5 },
            { type: 'estp', name: 'ESTP', title: '企业家', orbitRadius: 110, orbitSpeed: 'fast', startAngle: 315 },
            { type: 'esfp', name: 'ESFP', title: '表演者', orbitRadius: 110, orbitSpeed: 'fast', startAngle: 337.5 }
        ];

        let selectedPlanet = null;
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX, startY;

        function getOnlineCount() {
            try {
                const accounts = JSON.parse(localStorage.getItem('mbtiAccounts') || '[]');
                return accounts.length;
            } catch (e) {
                return 0;
            }
        }

        function createStars() {
            const bg = document.getElementById('spaceBg');
            const starCount = 200;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.width = (Math.random() * 2.5 + 0.5) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                bg.appendChild(star);
            }
        }

        function createOrbits(container) {
            const orbits = [110, 150, 190];
            orbits.forEach(radius => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.style.width = (radius * 2) + 'px';
                orbit.style.height = (radius * 2) + 'px';
                container.appendChild(orbit);
            });
        }

        function createPlanets() {
            const container = document.getElementById('planetsContainer');

            createOrbits(container);

            planetsData.forEach((planet, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'planet-wrapper';
                wrapper.style.width = '0px';
                wrapper.style.height = '0px';

                const orbitDuration = planet.orbitSpeed === 'fast' ? 45 : planet.orbitSpeed === 'medium' ? 70 : 100;
                const orbitDelay = -(orbitDuration * (planet.startAngle / 360)) + 's';
                wrapper.style.animation = `orbit-${planet.orbitSpeed} ${orbitDuration}s infinite linear`;
                wrapper.style.animationDelay = orbitDelay;

                const planetEl = document.createElement('div');
                planetEl.className = `planet ${planet.type}`;

                const angleRad = (planet.startAngle * Math.PI) / 180;
                const x = Math.cos(angleRad) * planet.orbitRadius;
                const y = Math.sin(angleRad) * planet.orbitRadius;

                planetEl.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;

                const planet3d = document.createElement('div');
                planet3d.className = 'planet-3d';
                planetEl.appendChild(planet3d);

                const label = document.createElement('div');
                label.className = 'planet-label';
                const onlineCount = getOnlineCount();
                label.textContent = `${planet.name} | ${planet.title}`;
                planetEl.appendChild(label);

                planetEl.addEventListener('click', () => {
                    openModal(planet);
                });

                wrapper.appendChild(planetEl);
                container.appendChild(wrapper);
            });
        }

        function updateTransform() {
            const container = document.getElementById('planetsContainer');
            container.style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
        }

        function zoomIn() {
            scale = Math.min(2.5, scale + 0.2);
            updateTransform();
        }

        function zoomOut() {
            scale = Math.max(0.5, scale - 0.2);
            updateTransform();
        }

        const wrapper = document.getElementById('planetsWrapper');

        wrapper.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            wrapper.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            wrapper.style.cursor = 'grab';
        });

        wrapper.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            scale = Math.max(0.5, Math.min(2.5, scale + delta));
            updateTransform();
        });

        let touchStartDist = 0;
        let touchStartScale = 1;

        wrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - translateX;
                startY = e.touches[0].clientY - translateY;
            } else if (e.touches.length === 2) {
                touchStartDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                touchStartScale = scale;
            }
        });

        wrapper.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                updateTransform();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                scale = Math.max(0.5, Math.min(2.5, touchStartScale * (dist / touchStartDist)));
                updateTransform();
            }
        });

        wrapper.addEventListener('touchend', () => {
            isDragging = false;
        });

        document.getElementById('zoomIn').addEventListener('click', zoomIn);
        document.getElementById('zoomOut').addEventListener('click', zoomOut);
        wrapper.style.cursor = 'grab';

        function openModal(planet) {
            selectedPlanet = planet;
            document.getElementById('modalPlanetName').textContent = planet.name + ' ' + planet.title;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            selectedPlanet = null;
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function enterChat(roomType) {
            if (!selectedPlanet) return;
            const mbti = selectedPlanet.name.toUpperCase();
            if (roomType === 'flower') {
                window.location.href = `chat-flower.html?mbti=${mbti}`;
            } else {
                window.location.href = `chat-ocean.html?mbti=${mbti}`;
            }
        }

        document.getElementById('flowerOption').addEventListener('click', () => enterChat('flower'));
        document.getElementById('oceanOption').addEventListener('click', () => enterChat('ocean'));
        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            createPlanets();
        });
    </script>
</body>
</html>
