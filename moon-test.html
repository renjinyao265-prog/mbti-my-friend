<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月亮测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 星光背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* 月亮星球容器 */
        .moon-container {
            position: relative;
            width: 250px;
            height: 250px;
            animation: rotate-very-slow 60s infinite linear;
        }

        /* 月亮主体 */
        .moon {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #5a4a7a 0%, #4a3a6a 30%, #3a2a5a 60%, #2a1a4a 100%);
            box-shadow:
                inset -20px -15px 40px rgba(0,0,0,0.6),
                inset 15px 10px 30px rgba(120,100,150,0.3),
                10px 10px 40px rgba(0,0,0,0.8),
                -5px -5px 30px rgba(80,60,100,0.4);
        }

        /* 月亮缺口（用一个圆形遮住一部分） */
        .moon-cutout {
            position: absolute;
            top: -20px;
            right: -30px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
        }

        /* 陨石坑 */
        .crater {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(60,40,80,0.9), rgba(30,20,50,0.95));
            box-shadow: inset 3px 3px 8px rgba(0,0,0,0.6);
        }
        .crater-1 { width: 25px; height: 25px; top: 40px; left: 50px; }
        .crater-2 { width: 18px; height: 18px; top: 90px; left: 120px; }
        .crater-3 { width: 15px; height: 15px; top: 130px; left: 60px; }
        .crater-4 { width: 20px; height: 20px; top: 60px; left: 130px; }
        .crater-5 { width: 12px; height: 12px; top: 150px; left: 110px; }

        /* 闪烁星星（在缺口中间） */
        .hanging-star {
            position: absolute;
            top: 25px;
            right: 5px;
            width: 25px;
            height: 25px;
            animation: glow-pulse 2.5s infinite ease-in-out;
        }
        .hanging-star::before,
        .hanging-star::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 2px;
        }
        .hanging-star::before {
            width: 100%;
            height: 30%;
            top: 35%;
            left: 0;
            box-shadow: 0 0 12px #fff, 0 0 25px #d0b0ff;
        }
        .hanging-star::after {
            width: 30%;
            height: 100%;
            top: 0;
            left: 35%;
            box-shadow: 0 0 12px #fff, 0 0 25px #d0b0ff;
        }

        /* 小白猫（在月亮顶端） */
        .white-cat {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        /* 猫身体 */
        .cat-body {
            width: 50px;
            height: 30px;
            background: linear-gradient(135deg, #ffffff 0%, #e8e8e8 50%, #d0d0d0 100%);
            border-radius: 25px 25px 20px 20px;
            position: relative;
            box-shadow:
                inset 5px 5px 10px rgba(255,255,255,0.8),
                inset -3px -3px 8px rgba(0,0,0,0.1),
                3px 5px 12px rgba(0,0,0,0.3);
        }
        /* 猫头 */
        .cat-head {
            position: absolute;
            top: -18px;
            left: 5px;
            width: 35px;
            height: 30px;
            background: linear-gradient(135deg, #ffffff 0%, #e8e8e8 100%);
            border-radius: 50% 50% 45% 45%;
            box-shadow:
                inset 3px 3px 8px rgba(255,255,255,0.9),
                2px 3px 8px rgba(0,0,0,0.25);
        }
        /* 猫耳朵 */
        .cat-ear {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 15px solid #f0f0f0;
        }
        .cat-ear.left { top: -12px; left: 3px; transform: rotate(-15deg); }
        .cat-ear.right { top: -12px; left: 16px; transform: rotate(15deg); }
        /* 猫眼睛 */
        .cat-eye {
            position: absolute;
            width: 6px;
            height: 8px;
            background: #1a1a2e;
            border-radius: 50%;
            top: 10px;
        }
        .cat-eye::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
        }
        .cat-eye.left { left: 8px; }
        .cat-eye.right { left: 20px; }
        /* 猫尾巴 */
        .cat-tail {
            position: absolute;
            right: -15px;
            bottom: 5px;
            width: 25px;
            height: 12px;
            border: 6px solid #e8e8e8;
            border-left: none;
            border-bottom: none;
            border-radius: 0 15px 0 0;
            transform: rotate(30deg);
        }

        @keyframes rotate-very-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes glow-pulse {
            0%, 100% {
                opacity: 0.8;
                filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 15px #d0b0ff);
            }
            50% {
                opacity: 1;
                filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px #d0b0ff);
            }
        }

        /* 提示文字 */
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="moon-container">
        <!-- 月亮主体 -->
        <div class="moon">
            <!-- 陨石坑 -->
            <div class="crater crater-1"></div>
            <div class="crater crater-2"></div>
            <div class="crater crater-3"></div>
            <div class="crater crater-4"></div>
            <div class="crater crater-5"></div>
        </div>

        <!-- 月亮缺口 -->
        <div class="moon-cutout"></div>

        <!-- 悬挂的星星 -->
        <div class="hanging-star"></div>

        <!-- 小白猫 -->
        <div class="white-cat">
            <div class="cat-body">
                <div class="cat-tail"></div>
            </div>
            <div class="cat-head">
                <div class="cat-ear left"></div>
                <div class="cat-ear right"></div>
                <div class="cat-eye left"></div>
                <div class="cat-eye right"></div>
            </div>
        </div>
    </div>

    <div class="hint">胖圆弯月 + 小白猫 · 测试版</div>

    <script>
        // 创建背景星光
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = (Math.random() * 2.5 + 0.5) + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
