<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 个人中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }

        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(80,60,150,0.6), transparent);
        }

        .back-btn {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 22px;
            border-radius: 18px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        .logo {
            color: white;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        /* 主内容 */
        .main-content {
            padding-top: 100px;
            padding-bottom: 50px;
            max-width: 500px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
        }

        /* 个人信息卡片 */
        .profile-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.25);
            margin-bottom: 25px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 800;
            color: #3a2a5a;
            margin-bottom: 5px;
        }

        .profile-mbti {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #a080ff 0%, #8060e0 100%);
            color: white;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .profile-bio {
            color: #7a6a9a;
            font-size: 14px;
            margin-top: 10px;
            line-height: 1.5;
        }

        /* 统计数据 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(100,80,150,0.1);
        }

        .stat-item {
            text-align: center;
            padding: 15px 10px;
            background: rgba(102,126,234,0.08);
            border-radius: 16px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #8a7aaa;
            font-weight: 600;
        }

        /* 详细信息列表 */
        .info-list {
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(100,80,150,0.1);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #7a6a9a;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-value {
            color: #4a3a6a;
            font-weight: 600;
            font-size: 14px;
        }

        /* 历史账号卡片 */
        .section-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.25);
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 800;
            color: #3a2a5a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .account-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .account-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(102,126,234,0.08);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .account-item:hover {
            background: rgba(102,126,234,0.15);
            transform: translateX(5px);
        }

        .account-item.current {
            border: 2px solid #667eea;
            background: rgba(102,126,234,0.15);
        }

        .account-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .account-info {
            flex: 1;
        }

        .account-name {
            font-size: 15px;
            font-weight: 700;
            color: #3a2a5a;
            margin-bottom: 3px;
        }

        .account-email {
            font-size: 12px;
            color: #8a7aaa;
        }

        .account-badge {
            padding: 4px 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
        }

        /* 操作按钮 */
        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        .action-btn.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102,126,234,0.5);
        }

        .action-btn.secondary {
            background: rgba(255,255,255,0.9);
            color: #667eea;
            border: 2px solid rgba(102,126,234,0.3);
        }

        .action-btn.secondary:hover {
            background: rgba(102,126,234,0.08);
            transform: translateY(-2px);
        }

        .action-btn.danger {
            background: rgba(255,100,100,0.1);
            color: #e74c3c;
            border: 2px solid rgba(255,100,100,0.3);
        }

        .action-btn.danger:hover {
            background: rgba(255,100,100,0.2);
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #8a7aaa;
            font-size: 14px;
        }

        .empty-state span {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <button class="back-btn" onclick="goBack()">← 返回星球大厅</button>
        <div class="logo">👤 个人中心</div>
        <div style="width:100px;"></div>
    </nav>

    <div class="main-content">
        <!-- 个人信息卡片 -->
        <div class="profile-card" id="profileCard">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">星</div>
                <div class="profile-info">
                    <div class="profile-name" id="profileName">小星人</div>
                    <div class="profile-mbti" id="profileMbti">INFP</div>
                    <div class="profile-bio" id="profileBio">这是一句自我介绍~</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="friendCount">12</div>
                    <div class="stat-label">好友</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="chatCount">156</div>
                    <div class="stat-label">消息</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="onlineDays">7</div>
                    <div class="stat-label">在线天数</div>
                </div>
            </div>

            <div class="info-list">
                <div class="info-item">
                    <div class="info-label">📧 账号</div>
                    <div class="info-value" id="infoAccount">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">🎂 出生年份</div>
                    <div class="info-value" id="infoBirthYear">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">👤 性别</div>
                    <div class="info-value" id="infoGender">-</div>
                </div>
            </div>
        </div>

        <!-- 历史账号 -->
        <div class="section-card">
            <div class="section-title">
                <span>🔐</span> 登录过的账号
            </div>
            <div class="account-list" id="accountList"></div>
        </div>

        <!-- 操作按钮 -->
        <button class="action-btn secondary" onclick="switchAccount()">🔄 切换账号</button>
        <button class="action-btn danger" onclick="logout()">🚪 退出登录</button>
    </div>

    <script>
        let currentUser = null;

        // 获取用户统计数据
        function getUserStats(account) {
            try {
                const allStats = JSON.parse(localStorage.getItem('mbtiUserStats') || '{}');
                return allStats[account] || { friendCount: 0, chatCount: 0, onlineDays: 1 };
            } catch (e) {
                return { friendCount: 0, chatCount: 0, onlineDays: 1 };
            }
        }

        // 保存用户统计数据
        function saveUserStats(account, stats) {
            try {
                const allStats = JSON.parse(localStorage.getItem('mbtiUserStats') || '{}');
                allStats[account] = stats;
                localStorage.setItem('mbtiUserStats', JSON.stringify(allStats));
            } catch (e) {}
        }

        function getAccounts() {
            try {
                return JSON.parse(localStorage.getItem('mbtiAccounts') || '{}');
            } catch (e) {
                return {};
            }
        }

        function loadCurrentUser() {
            const savedUser = localStorage.getItem('mbtiUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    renderProfile();
                    renderAccountList();
                } catch(e) {
                    goToLogin();
                }
            } else {
                goToLogin();
            }
        }

        function renderProfile() {
            if (!currentUser) return;

            document.getElementById('profileAvatar').textContent = (currentUser.nickname || '星').charAt(0);
            document.getElementById('profileName').textContent = currentUser.nickname || '小星人';
            document.getElementById('profileMbti').textContent = currentUser.mbti || 'INFP';
            document.getElementById('profileBio').textContent = currentUser.bio || '这个人很懒，什么都没写~';

            document.getElementById('infoAccount').textContent = currentUser.account || '-';
            document.getElementById('infoBirthYear').textContent = currentUser.birthYear || '-';

            const genderText = { female: '女生', male: '男生', other: '其他' };
            document.getElementById('infoGender').textContent = genderText[currentUser.gender] || '-';

            // 从 localStorage 获取或初始化为0
            const stats = getUserStats(currentUser.account);
            document.getElementById('friendCount').textContent = stats.friendCount;
            document.getElementById('chatCount').textContent = stats.chatCount;
            document.getElementById('onlineDays').textContent = stats.onlineDays;
        }

        function renderAccountList() {
            const accounts = getAccounts();
            const accountList = document.getElementById('accountList');
            const accountKeys = Object.keys(accounts);

            if (accountKeys.length === 0) {
                accountList.innerHTML = `
                    <div class="empty-state">
                        <span>📭</span>
                        暂无其他登录过的账号
                    </div>
                `;
                return;
            }

            accountList.innerHTML = accountKeys.map(account => {
                const user = accounts[account];
                const isCurrent = currentUser && currentUser.account === account;
                return `
                    <div class="account-item ${isCurrent ? 'current' : ''}" onclick="loginAsAccount('${account}')">
                        <div class="account-avatar">${(user.nickname || '星').charAt(0)}</div>
                        <div class="account-info">
                            <div class="account-name">${user.nickname || '用户'} · ${user.mbti || 'MBTI'}</div>
                            <div class="account-email">${account}</div>
                        </div>
                        ${isCurrent ? '<div class="account-badge">当前</div>' : ''}
                    </div>
                `;
            }).join('');
        }

        function loginAsAccount(account) {
            const accounts = getAccounts();
            if (accounts[account]) {
                const user = accounts[account];
                localStorage.setItem('mbtiUser', JSON.stringify(user));
                localStorage.setItem('mbtiToken', user.account);
                localStorage.setItem('mbtiCurrentAccount', user.account);
                currentUser = user;
                renderProfile();
                renderAccountList();
            }
        }

        function switchAccount() {
            localStorage.removeItem('mbtiCurrentAccount');
            goToLogin();
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('mbtiUser');
                localStorage.removeItem('mbtiToken');
                localStorage.removeItem('mbtiCurrentAccount');
                goToLogin();
            }
        }

        function goToLogin() {
            window.location.href = 'login.html';
        }

        function goBack() {
            window.location.href = 'home.html';
        }

        loadCurrentUser();
    </script>
</body>
</html>
