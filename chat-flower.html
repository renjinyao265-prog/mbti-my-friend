<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 花田聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 30%, #B8E8C8 60%, #78C880 100%);
        }

        /* 花田背景 */
        .flower-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .sky-cloud {
            position: absolute;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            filter: blur(2px);
            animation: float-cloud 60s linear infinite;
        }

        @keyframes float-cloud {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(calc(100vw + 200px)); }
        }

        .flower {
            position: absolute;
            bottom: 50px;
            font-size: 40px;
            animation: sway 4s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* 云朵消息容器 */
        .clouds-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 140px);
            z-index: 5;
            pointer-events: none;
        }

        .message-cloud {
            position: absolute;
            pointer-events: none;
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-80vh); opacity: 1; }
        }

        .cloud-shape {
            position: relative;
            background: white;
            border-radius: 50px;
            padding: 15px 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1), 0 0 0 4px rgba(255,255,255,0.8);
            max-width: 280px;
        }

        .cloud-shape::before,
        .cloud-shape::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud-shape::before {
            width: 40px;
            height: 40px;
            top: -20px;
            left: 20px;
        }

        .cloud-shape::after {
            width: 30px;
            height: 30px;
            top: -15px;
            right: 25px;
        }

        .cloud-name {
            font-size: 12px;
            font-weight: 600;
            color: #8080a0;
            margin-bottom: 5px;
        }

        .cloud-text {
            font-size: 14px;
            color: #404060;
            line-height: 1.4;
            word-break: break-word;
        }

        /* 顶部栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(100,180,100,0.15);
            border: 1px solid rgba(100,180,100,0.3);
            color: #408040;
            padding: 8px 16px;
            border-radius: 18px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(100,180,100,0.25);
        }

        .room-info {
            flex: 1;
            text-align: center;
            color: #406040;
        }

        .room-title {
            font-size: 18px;
            font-weight: 600;
        }

        .room-subtitle {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 2px;
        }

        /* 输入区域 */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(0deg, rgba(255,255,255,0.98), rgba(255,255,255,0.9));
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            padding: 15px 20px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .input-area input {
            flex: 1;
            height: 45px;
            background: rgba(100,180,100,0.1);
            border: 1px solid rgba(100,180,100,0.25);
            border-radius: 22px;
            padding: 0 20px;
            color: #406040;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-area input::placeholder {
            color: rgba(80,120,80,0.4);
        }

        .input-area input:focus {
            background: rgba(100,180,100,0.15);
            border-color: rgba(100,180,100,0.4);
        }

        .send-btn {
            margin-left: 12px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #80d080, #60c0a0);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(100,150,100,0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #8a9a8a;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(100,180,100,0.1);
        }

        .nav-item.active {
            color: #60a060;
        }

        .nav-item-icon {
            font-size: 22px;
            margin-bottom: 3px;
        }

        .nav-item-text {
            font-size: 11px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="flower-bg" id="flowerBg"></div>
    <div class="clouds-container" id="cloudsContainer"></div>

    <div class="top-bar">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <div class="room-info">
            <div class="room-title" id="roomTitle">🌷 花田聊天室</div>
            <div class="room-subtitle" id="roomSubtitle">云朵消息聊天室</div>
        </div>
        <div style="width: 80px;"></div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="在花田里说点什么吧~ 🌷" onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">→</button>
    </div>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <span class="nav-item-icon">🌍</span>
            <span class="nav-item-text">星球大厅</span>
        </a>
        <a href="friend.html" class="nav-item">
            <span class="nav-item-icon">👥</span>
            <span class="nav-item-text">交友云</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-item-icon">👤</span>
            <span class="nav-item-text">个人中心</span>
        </a>
    </nav>

    <script>
        let currentUser = null;
        let currentRoomMbti = '';
        let messages = [];

        const mbtiData = {
            INTJ: { name: '战略家', desc: '高冷智慧的战略家们在花田相聚' },
            INTP: { name: '逻辑家', desc: '脑洞大开的思考者们在花田相聚' },
            ENTJ: { name: '统帅', desc: '气场全开的领导者们在花田相聚' },
            ENTP: { name: '辩论家', desc: '脑洞无限的辩论家们在花田相聚' },
            INFJ: { name: '洞察者', desc: '温柔治愈的洞察者们在花田相聚' },
            INFP: { name: '理想家', desc: '浪漫敏感的理想主义者们在花田相聚' },
            ENFJ: { name: '引导者', desc: '温暖包容的引导者们在花田相聚' },
            ENFP: { name: '逐梦者', desc: '热情活泼的逐梦者们在花田相聚' },
            ISTJ: { name: '检查者', desc: '严谨可靠的秩序者们在花田相聚' },
            ISFJ: { name: '守卫者', desc: '温暖贴心的守护者们在花田相聚' },
            ESTJ: { name: '管理者', desc: '规则至上的管理者们在花田相聚' },
            ESFJ: { name: '执政官', desc: '暖心社交的执政官们在花田相聚' },
            ISTP: { name: '鉴赏家', desc: '酷感实干的工匠们在花田相聚' },
            ISFP: { name: '探险家', desc: '温柔审美的艺术家们在花田相聚' },
            ESTP: { name: '企业家', desc: '热血行动的冒险家们在花田相聚' },
            ESFP: { name: '表演者', desc: '派对中心的表演者们在花田相聚' }
        };

        function initUser() {
            const saved = localStorage.getItem('mbtiUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                } catch(e) {
                    currentUser = { id: Date.now().toString(), nickname: '花精灵', mbti: 'INFP', avatar: '🦋' };
                }
            } else {
                currentUser = { id: Date.now().toString(), nickname: '花精灵', mbti: 'INFP', avatar: '🦋' };
            }
        }

        function getRoomMessagesKey() {
            return `mbtiFlowerMessages_${currentRoomMbti}`;
        }

        function saveMessageToStorage(msg) {
            try {
                const key = getRoomMessagesKey();
                const allMessages = JSON.parse(localStorage.getItem(key) || '[]');
                msg.timestamp = Date.now();
                allMessages.push(msg);
                if (allMessages.length > 50) {
                    allMessages.shift();
                }
                localStorage.setItem(key, JSON.stringify(allMessages));
            } catch (e) {}
        }

        function createMessageCloud(msg, isHistorical = false) {
            const container = document.getElementById('cloudsContainer');
            const cloud = document.createElement('div');
            cloud.className = 'message-cloud';

            const left = 10 + Math.random() * 70;
            const duration = 25 + Math.random() * 20;
            const delay = isHistorical ? -Math.random() * duration : 0;

            cloud.style.left = left + '%';
            cloud.style.bottom = '0px';
            cloud.style.animationDuration = duration + 's';
            cloud.style.animationDelay = delay + 's';

            cloud.innerHTML = `
                <div class="cloud-shape">
                    <div class="cloud-name">${msg.avatar || '🌸'} ${msg.nickname}</div>
                    <div class="cloud-text">${msg.text}</div>
                </div>
            `;

            container.appendChild(cloud);

            setTimeout(() => {
                cloud.style.animation = 'none';
                cloud.offsetHeight;
                cloud.style.animation = `float-up ${duration}s linear infinite`;
            }, 10);

            setTimeout(() => {
                if (cloud.parentNode) {
                    cloud.remove();
                }
            }, (duration - Math.abs(delay)) * 1000);
        }

        function loadMessagesFromStorage() {
            try {
                const key = getRoomMessagesKey();
                const allMessages = JSON.parse(localStorage.getItem(key) || '[]');
                const recentMessages = allMessages.slice(-15);
                recentMessages.forEach(msg => {
                    createMessageCloud(msg, true);
                });
            } catch (e) {}
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const msg = {
                userId: currentUser && currentUser.id,
                nickname: currentUser && currentUser.nickname || '花精灵',
                avatar: currentUser && currentUser.avatar || '🦋',
                text: text
            };

            createMessageCloud(msg, false);
            saveMessageToStorage(msg);
            input.value = '';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function goBack() {
            window.location.href = 'home.html';
        }

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return params.get('mbti') || 'INFP';
        }

        function createBackground() {
            const bg = document.getElementById('flowerBg');

            for (let i = 0; i < 8; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'sky-cloud';
                cloud.style.top = (5 + Math.random() * 25) + '%';
                cloud.style.width = (80 + Math.random() * 120) + 'px';
                cloud.style.height = (40 + Math.random() * 40) + 'px';
                cloud.style.animationDuration = (40 + Math.random() * 40) + 's';
                cloud.style.animationDelay = -Math.random() * 60 + 's';
                bg.appendChild(cloud);
            }

            const flowers = ['🌷', '🌻', '🌼', '🌸', '💐', '🌺'];
            for (let i = 0; i < 25; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                flower.style.left = (i * 4 + Math.random() * 3) + '%';
                flower.style.animationDelay = Math.random() * 2 + 's';
                flower.style.fontSize = (30 + Math.random() * 20) + 'px';
                bg.appendChild(flower);
            }
        }

        function initRoom() {
            const mbti = getUrlParams();
            currentRoomMbti = mbti;
            const data = mbtiData[mbti] || mbtiData.INFP;
            document.getElementById('roomTitle').textContent = `🌷 ${mbti} 花田聊天室`;
            document.getElementById('roomSubtitle').textContent = data.desc;
            loadMessagesFromStorage();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initUser();
            createBackground();
            initRoom();
        });
    </script>
</body>
</html>
