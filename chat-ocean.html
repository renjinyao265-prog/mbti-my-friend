<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 海水聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #1a3a5c 0%, #0d2840 50%, #071a2c 100%);
        }

        /* 海底背景 */
        .ocean-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(150,200,255,0.3));
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.7; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        .seaweed {
            position: absolute;
            bottom: 0;
            width: 20px;
            background: linear-gradient(to top, #105030, #20a060);
            border-radius: 50% 50% 0 0;
            transform-origin: bottom center;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* 顶部栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(180deg, rgba(10, 40, 70, 0.95), rgba(10, 40, 70, 0.8));
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            padding: 8px 16px;
            border-radius: 18px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .room-info {
            flex: 1;
            text-align: center;
            color: white;
        }

        .room-title {
            font-size: 18px;
            font-weight: 600;
        }

        .room-subtitle {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 2px;
        }

        /* 聊天区域 */
        .chat-area {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 80px;
            overflow-y: auto;
            padding: 20px;
            z-index: 10;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.self {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #40a0ff, #60c0ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            margin: 0 12px;
        }

        .message.self .message-avatar {
            background: linear-gradient(135deg, #40d0a0, #60f0c0);
        }

        .message-content {
            max-width: 70%;
        }

        .message-name {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 4px;
        }

        .message.self .message-name {
            text-align: right;
        }

        .message-bubble {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 16px;
            border-radius: 18px;
            color: white;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.self .message-bubble {
            background: linear-gradient(135deg, rgba(64, 160, 255, 0.4), rgba(64, 208, 160, 0.4));
            border-color: rgba(100, 200, 255, 0.4);
        }

        /* 输入区域 */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(0deg, rgba(10, 40, 70, 0.98), rgba(10, 40, 70, 0.9));
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            padding: 15px 20px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .input-area input {
            flex: 1;
            height: 45px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 22px;
            padding: 0 20px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-area input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .input-area input:focus {
            background: rgba(255,255,255,0.18);
            border-color: rgba(100, 180, 255, 0.5);
        }

        .send-btn {
            margin-left: 12px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #40a0ff, #60c0ff);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(20, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(100, 80, 150, 0.3);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #8a8aa0;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(120, 100, 180, 0.15);
        }

        .nav-item.active {
            color: #b090ff;
        }

        .nav-item-icon {
            font-size: 22px;
            margin-bottom: 3px;
        }

        .nav-item-text {
            font-size: 11px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="ocean-bg" id="oceanBg"></div>

    <div class="top-bar">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <div class="room-info">
            <div class="room-title" id="roomTitle">🌊 海水聊天室</div>
            <div class="room-subtitle" id="roomSubtitle">公共互通聊天室</div>
        </div>
        <div style="width: 80px;"></div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="在海里说点什么吧~ 🌊" onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">→</button>
    </div>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <span class="nav-item-icon">🌍</span>
            <span class="nav-item-text">星球大厅</span>
        </a>
        <a href="friend.html" class="nav-item">
            <span class="nav-item-icon">👥</span>
            <span class="nav-item-text">交友云</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-item-icon">👤</span>
            <span class="nav-item-text">个人中心</span>
        </a>
    </nav>

    <script>
        let currentUser = null;
        let currentRoomMbti = '';
        let messages = [];

        const mbtiData = {
            INTJ: { name: '战略家', desc: '高冷智慧的战略家们在深海相聚' },
            INTP: { name: '逻辑家', desc: '脑洞大开的思考者们在深海相聚' },
            ENTJ: { name: '统帅', desc: '气场全开的领导者们在深海相聚' },
            ENTP: { name: '辩论家', desc: '脑洞无限的辩论家们在深海相聚' },
            INFJ: { name: '洞察者', desc: '温柔治愈的洞察者们在深海相聚' },
            INFP: { name: '理想家', desc: '浪漫敏感的理想主义者们在深海相聚' },
            ENFJ: { name: '引导者', desc: '温暖包容的引导者们在深海相聚' },
            ENFP: { name: '逐梦者', desc: '热情活泼的逐梦者们在深海相聚' },
            ISTJ: { name: '检查者', desc: '严谨可靠的秩序者们在深海相聚' },
            ISFJ: { name: '守卫者', desc: '温暖贴心的守护者们在深海相聚' },
            ESTJ: { name: '管理者', desc: '规则至上的管理者们在深海相聚' },
            ESFJ: { name: '执政官', desc: '暖心社交的执政官们在深海相聚' },
            ISTP: { name: '鉴赏家', desc: '酷感实干的工匠们在深海相聚' },
            ISFP: { name: '探险家', desc: '温柔审美的艺术家们在深海相聚' },
            ESTP: { name: '企业家', desc: '热血行动的冒险家们在深海相聚' },
            ESFP: { name: '表演者', desc: '派对中心的表演者们在深海相聚' }
        };

        function initUser() {
            const saved = localStorage.getItem('mbtiUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                } catch(e) {
                    currentUser = { id: Date.now().toString(), nickname: '深海旅人', mbti: 'INFP', avatar: '🐟' };
                }
            } else {
                currentUser = { id: Date.now().toString(), nickname: '深海旅人', mbti: 'INFP', avatar: '🐟' };
            }
        }

        function getRoomMessagesKey() {
            return `mbtiOceanMessages_${currentRoomMbti}`;
        }

        function saveMessageToStorage(msg) {
            try {
                const key = getRoomMessagesKey();
                const allMessages = JSON.parse(localStorage.getItem(key) || '[]');
                msg.timestamp = Date.now();
                allMessages.push(msg);
                if (allMessages.length > 300) {
                    allMessages.shift();
                }
                localStorage.setItem(key, JSON.stringify(allMessages));
            } catch (e) {}
        }

        function loadMessagesFromStorage() {
            try {
                const key = getRoomMessagesKey();
                const allMessages = JSON.parse(localStorage.getItem(key) || '[]');
                allMessages.forEach(msg => {
                    renderMessage(msg, false);
                });
                const chatArea = document.getElementById('chatArea');
                chatArea.scrollTop = chatArea.scrollHeight;
            } catch (e) {}
        }

        function renderMessage(msg, saveToStorage = true) {
            const chatArea = document.getElementById('chatArea');
            const isSelf = msg.userId === (currentUser && currentUser.id);
            const div = document.createElement('div');
            div.className = 'message' + (isSelf ? ' self' : '');
            div.innerHTML = `
                <div class="message-avatar">${msg.avatar || '🐟'}</div>
                <div class="message-content">
                    <div class="message-name">${msg.nickname}</div>
                    <div class="message-bubble">${msg.text}</div>
                </div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            messages.push(msg);

            if (isSelf && saveToStorage) {
                saveMessageToStorage(msg);
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const msg = {
                userId: currentUser && currentUser.id,
                nickname: currentUser && currentUser.nickname || '深海旅人',
                avatar: currentUser && currentUser.avatar || '🐟',
                text: text
            };

            renderMessage(msg, true);
            input.value = '';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function goBack() {
            window.location.href = 'home.html';
        }

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return params.get('mbti') || 'INFP';
        }

        function createBubbles() {
            const bg = document.getElementById('oceanBg');
            for (let i = 0; i < 30; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.width = (5 + Math.random() * 15) + 'px';
                bubble.style.height = bubble.style.width;
                bubble.style.animationDuration = (8 + Math.random() * 12) + 's';
                bubble.style.animationDelay = Math.random() * 10 + 's';
                bg.appendChild(bubble);
            }
        }

        function createSeaweed() {
            const bg = document.getElementById('oceanBg');
            for (let i = 0; i < 12; i++) {
                const seaweed = document.createElement('div');
                seaweed.className = 'seaweed';
                seaweed.style.left = (i * 9 + Math.random() * 5) + '%';
                seaweed.style.height = (80 + Math.random() * 120) + 'px';
                seaweed.style.animationDelay = Math.random() * 2 + 's';
                bg.appendChild(seaweed);
            }
        }

        function initRoom() {
            const mbti = getUrlParams();
            currentRoomMbti = mbti;
            const data = mbtiData[mbti] || mbtiData.INFP;
            document.getElementById('roomTitle').textContent = `🌊 ${mbti} 海水聊天室`;
            document.getElementById('roomSubtitle').textContent = data.desc;
            loadMessagesFromStorage();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initUser();
            createBubbles();
            createSeaweed();
            initRoom();
        });
    </script>
</body>
</html>
