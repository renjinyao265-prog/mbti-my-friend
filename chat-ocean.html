<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBTI 海水聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        /* Three.js 画布 */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* UI 层 */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
            pointer-events: auto;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }

        /* 房间标题 */
        .room-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .room-title h1 {
            color: white;
            font-size: 26px;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(100,200,255,0.6);
        }

        .room-title p {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            margin-top: 5px;
        }

        /* 右下角浮动按钮 */
        .floating-menu-btn {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00a0ff 0%, #0060cc 100%);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 8px 30px rgba(0,100,200,0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-menu-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(0,100,200,0.6);
        }

        .floating-menu-btn.active {
            transform: rotate(45deg);
            background: linear-gradient(135deg, #ff8080 0%, #e06060 100%);
        }

        /* 展开的控制面板 */
        .expanded-panel {
            position: fixed;
            bottom: 170px;
            right: 20px;
            z-index: 190;
            pointer-events: auto;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 24px;
            padding: 20px;
            width: 240px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 15px 50px rgba(0,50,100,0.3);
            display: none;
            animation: slideUp 0.3s ease;
        }

        .expanded-panel.show {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0,100,200,0.15);
        }

        .panel-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .panel-section h3 {
            color: #2a5a8a;
            font-size: 14px;
            margin-bottom: 14px;
            text-align: center;
            font-weight: 700;
        }

        /* 深度指示器 */
        .depth-indicator-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .depth-bar {
            width: 12px;
            height: 120px;
            background: rgba(0,100,200,0.1);
            border-radius: 6px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .depth-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, #0050a0, #00a0e0);
            border-radius: 6px;
            transition: height 0.3s ease;
        }

        .depth-text {
            text-align: center;
            color: #2a5a8a;
            font-size: 13px;
            margin-top: 10px;
            font-weight: 600;
        }

        /* 控制组 */
        .control-group {
            margin-bottom: 14px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-group label {
            display: block;
            color: #3a6a9a;
            font-size: 12px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .control-group input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .control-value {
            text-align: right;
            color: #2a6aaa;
            font-size: 11px;
            margin-top: 4px;
        }

        /* 聊天区域 - 泡泡 */
        .chat-area {
            position: fixed;
            top: 100px;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            width: 550px;
            overflow-y: auto;
            z-index: 50;
            pointer-events: auto;
            padding: 20px;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(100,200,255,0.4);
            border-radius: 3px;
        }

        /* 泡泡消息 */
        .bubble-message {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            margin-bottom: 20px;
        }

        .bubble-message.self {
            flex-direction: row-reverse;
        }

        .bubble-avatar {
            font-size: 28px;
        }

        .bubble {
            position: relative;
            padding: 16px 22px;
            background: rgba(255,255,255,0.9);
            border-radius: 25px;
            max-width: 320px;
            box-shadow: 0 8px 25px rgba(0,100,150,0.2);
            animation: bubble-float 3s infinite ease-in-out;
        }

        .bubble-message.self .bubble {
            background: linear-gradient(135deg, #00c0ff 0%, #0090e0 100%);
            color: white;
        }

        @keyframes bubble-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .bubble::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 12px solid rgba(255,255,255,0.9);
        }

        .bubble-message.self .bubble::before {
            left: auto;
            right: 20px;
            border-top-color: #00a0e0;
        }

        .bubble-name {
            font-size: 12px;
            color: #0070a0;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .bubble-message.self .bubble-name {
            color: rgba(255,255,255,0.8);
        }

        .bubble-text {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }

        .bubble-message.self .bubble-text {
            color: white;
        }

        /* 输入框 */
        .input-area {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 550px;
            display: flex;
            gap: 12px;
            z-index: 100;
            pointer-events: auto;
        }

        .input-area input {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            color: white;
            font-size: 15px;
            outline: none;
            border: 1px solid rgba(255,255,255,0.25);
        }

        .input-area input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .send-btn {
            padding: 16px 28px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #00c0ff 0%, #0080d0 100%);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,150,255,0.4);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0,150,255,0.5);
        }

        /* 泡泡浮动提示 */
        .hint {
            position: fixed;
            top: 50%;
            right: 50px;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        /* 手机端响应式 */
        @media (max-width: 600px) {
            .chat-area {
                width: 92% !important;
                top: 90px !important;
                bottom: 110px !important;
                padding: 10px !important;
            }

            .input-area {
                width: 92% !important;
                bottom: 15px !important;
            }

            .input-area input {
                padding: 12px 18px !important;
                font-size: 14px !important;
            }

            .send-btn {
                padding: 12px 20px !important;
                font-size: 14px !important;
            }

            .bubble-message {
                gap: 8px !important;
                margin-bottom: 15px !important;
            }

            .bubble-avatar {
                font-size: 24px !important;
            }

            .bubble {
                padding: 12px 16px !important;
                max-width: 70% !important;
            }

            .bubble-name {
                font-size: 11px !important;
            }

            .bubble-text {
                font-size: 13px !important;
            }

            .floating-menu-btn {
                bottom: 90px !important;
                right: 12px !important;
                width: 48px !important;
                height: 48px !important;
                font-size: 20px !important;
            }

            .expanded-panel {
                bottom: 150px !important;
                right: 12px !important;
                width: 85% !important;
                max-width: 260px !important;
                max-height: 55vh !important;
            }

            .room-title h1 {
                font-size: 18px !important;
                letter-spacing: 3px !important;
            }

            .room-title p {
                font-size: 11px !important;
            }

            .back-btn {
                padding: 8px 14px !important;
                font-size: 12px !important;
            }

            .hint {
                right: 15px !important;
                font-size: 11px !important;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-layer">
        <!-- 返回按钮 -->
        <div style="position:fixed;top:25px;left:25px;z-index:100;pointer-events:auto;display:flex;gap:10px;">
            <button class="back-btn" onclick="goBack()" style="position:relative;top:0;left:0;">← 返回星球大厅</button>
            <button class="back-btn" onclick="switchRoom()" style="position:relative;top:0;left:0;background:rgba(255,150,200,0.3);">🌷 切换花朵聊天室</button>
        </div>

        <!-- 房间标题 -->
        <div class="room-title">
            <h1 id="roomTitle">🌊 INFP 海水聊天室</h1>
            <p id="roomSubtitle">消息在泡泡里漂浮，越飘越远~</p>
        </div>

        <!-- 右下角浮动按钮 -->
        <button class="floating-menu-btn" id="menuBtn" onclick="toggleMenu()">⚙️</button>

        <!-- 展开的控制面板 -->
        <div class="expanded-panel" id="expandedPanel">
            <div class="panel-section">
                <h3>🌊 深度</h3>
                <div class="depth-indicator-wrapper">
                    <div class="depth-bar">
                        <div class="depth-fill" id="depthFill"></div>
                    </div>
                    <div class="depth-text" id="depthText">60米</div>
                </div>
            </div>
            <div class="panel-section">
                <h3>📐 缩放控制</h3>
                <div class="control-group">
                    <label>🔍 视野缩放</label>
                    <input type="range" id="cameraZoom" min="0.5" max="3" step="0.1" value="1" oninput="updateCameraZoom(this.value)">
                    <div class="control-value" id="cameraZoomValue">100%</div>
                </div>
            </div>
        </div>

        <!-- 提示 -->
        <div class="hint">
            <p>🐠 小鱼正在看着你~</p>
            <p style="margin-top: 10px; font-size: 12px;">滚轮/双指缩放 · 拖动移动</p>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area" id="chatArea"></div>

        <!-- 输入框 -->
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="说点什么吧~ 你的消息会变成泡泡飘走~ 🌊" onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let water, bubbles = [], fishes = [];
        let time = 0;
        let cameraZoom = 1;
        let cameraOffsetX = 0, cameraOffsetZ = 0;
        let isDragging = false, isPinching = false;
        let lastMouseX = 0, lastMouseY = 0;
        let initialPinchDistance = 0, initialCameraZoom = 1;
        let depth = 60;

        function initThree() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 2, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00c0ff, 1, 50);
            pointLight.position.set(0, 5, 5);
            scene.add(pointLight);

            const blueLight = new THREE.PointLight(0x0080ff, 0.8, 40);
            blueLight.position.set(-5, 0, 3);
            scene.add(blueLight);

            // 创造海水背景
            createOceanBackground();

            // 创造水面
            createWaterSurface();

            // 创造泡泡
            createBubbles();

            // 创造小鱼
            createFishes();

            // 创造海底
            createSeabed();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('wheel', onWheel);

            // 鼠标事件
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            window.addEventListener('mouseleave', onMouseUp);

            // 触摸事件
            window.addEventListener('touchstart', onTouchStart, { passive: false });
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onTouchEnd);
            window.addEventListener('touchcancel', onTouchEnd);

            animate();
        }

        function createOceanBackground() {
            // 背景渐变（用大球模拟）
            const bgGeometry = new THREE.SphereGeometry(50, 32, 32);
            const bgMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    topColor: { value: new THREE.Color(0x0040a0) },
                    bottomColor: { value: new THREE.Color(0x001030) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vPosition;
                    void main() {
                        vUv = uv;
                        vPosition = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 bottomColor;
                    varying vec2 vUv;
                    varying vec3 vPosition;
                    void main() {
                        float t = (vPosition.y + 50.0) / 100.0;
                        vec3 color = mix(bottomColor, topColor, t);
                        gl_FragColor = vec4(color, 1.0);
                    }
                `,
                side: THREE.BackSide
            });
            const bg = new THREE.Mesh(bgGeometry, bgMaterial);
            scene.add(bg);

            // 水中颗粒（模仿水中漂浮物）
            const particleCount = 500;
            const particlesGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 40;
                positions[i + 1] = (Math.random() - 0.5) * 30 - 5;
                positions[i + 2] = (Math.random() - 0.5) * 30;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.06,
                color: 0x80c0ff,
                transparent: true,
                opacity: 0.6
            });

            const particles = new THREE.Points(particlesGeometry, particlesMaterial);
            particles.name = 'particles';
            scene.add(particles);
        }

        function createWaterSurface() {
            // 水面（用波动的平面）
            const waterGeometry = new THREE.PlaneGeometry(60, 60, 64, 64);
            const waterMaterial = new THREE.MeshStandardMaterial({
                color: 0x0080c0,
                transparent: true,
                opacity: 0.3,
                roughness: 0.1,
                metalness: 0.3
            });

            water = new THREE.Mesh(waterGeometry, waterMaterial);
            water.rotation.x = -Math.PI / 2;
            water.position.y = 8;
            water.userData.originalPositions = waterGeometry.attributes.position.array.slice();
            scene.add(water);

            // 水面反光
            const glowGeometry = new THREE.PlaneGeometry(50, 50);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x00a0ff,
                transparent: true,
                opacity: 0.15,
                side: THREE.DoubleSide
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            glow.rotation.x = -Math.PI / 2;
            glow.position.y = 7.9;
            scene.add(glow);
        }

        function createBubbles() {
            for (let i = 0; i < 30; i++) {
                const size = 0.08 + Math.random() * 0.2;
                const bubbleGeometry = new THREE.SphereGeometry(size, 16, 16);
                const bubbleMaterial = new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.25,
                    roughness: 0,
                    metalness: 0.1,
                    transmission: 0.9,
                    thickness: 0.1
                });

                const bubble = new THREE.Mesh(bubbleGeometry, bubbleMaterial);
                bubble.position.set(
                    (Math.random() - 0.5) * 30,
                    -15 + Math.random() * 20,
                    (Math.random() - 0.5) * 20
                );
                bubble.userData.speed = 0.02 + Math.random() * 0.03;
                bubble.userData.wobble = Math.random() * Math.PI * 2;

                bubbles.push(bubble);
                scene.add(bubble);
            }
        }

        function createFishes() {
            const fishColors = [0xff8080, 0x80ff80, 0x8080ff, 0xffff80, 0xff80ff, 0x80ffff];

            for (let i = 0; i < 15; i++) {
                const fishGroup = new THREE.Group();

                // 鱼身体
                const bodyGeometry = new THREE.SphereGeometry(0.25, 16, 16);
                bodyGeometry.scale(1.5, 1, 0.8);
                const bodyMaterial = new THREE.MeshStandardMaterial({
                    color: fishColors[i % fishColors.length],
                    roughness: 0.3,
                    metalness: 0.1
                });
                const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                fishGroup.add(body);

                // 鱼尾
                const tailGeometry = new THREE.ConeGeometry(0.15, 0.3, 4);
                const tailMaterial = new THREE.MeshStandardMaterial({
                    color: fishColors[(i + 1) % fishColors.length],
                    roughness: 0.3
                });
                const tail = new THREE.Mesh(tailGeometry, tailMaterial);
                tail.position.x = -0.35;
                tail.rotation.z = Math.PI / 2;
                fishGroup.add(tail);

                // 鱼眼睛
                const eyeGeometry = new THREE.SphereGeometry(0.05, 8, 8);
                const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
                const eye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                eye.position.set(0.18, 0.05, 0.18);
                fishGroup.add(eye);

                fishGroup.position.set(
                    (Math.random() - 0.5) * 25,
                    (Math.random() - 0.5) * 15,
                    (Math.random() - 0.5) * 20
                );
                fishGroup.userData.speed = 0.01 + Math.random() * 0.02;
                fishGroup.userData.direction = Math.random() * Math.PI * 2;
                fishGroup.userData.originalY = fishGroup.position.y;

                fishes.push(fishGroup);
                scene.add(fishGroup);
            }
        }

        function createSeabed() {
            // 海底沙子
            const sandGeometry = new THREE.PlaneGeometry(50, 50, 32, 32);
            const sandMaterial = new THREE.MeshStandardMaterial({
                color: 0x406040,
                roughness: 0.9
            });
            const sand = new THREE.Mesh(sandGeometry, sandMaterial);
            sand.rotation.x = -Math.PI / 2;
            sand.position.y = -15;
            scene.add(sand);

            // 海草
            for (let i = 0; i < 20; i++) {
                const seaweedGeometry = new THREE.CylinderGeometry(0.03, 0.08, 2 + Math.random() * 2, 8);
                const seaweedMaterial = new THREE.MeshStandardMaterial({
                    color: 0x20a050,
                    roughness: 0.8
                });
                const seaweed = new THREE.Mesh(seaweedGeometry, seaweedMaterial);
                seaweed.position.set(
                    (Math.random() - 0.5) * 30,
                    -13.5,
                    (Math.random() - 0.5) * 25
                );
                seaweed.userData.sway = Math.random() * Math.PI * 2;
                scene.add(seaweed);
            }

            // 礁石
            for (let i = 0; i < 8; i++) {
                const rockGeometry = new THREE.DodecahedronGeometry(0.5 + Math.random() * 0.8, 0);
                const rockMaterial = new THREE.MeshStandardMaterial({
                    color: 0x505060,
                    roughness: 0.9
                });
                const rock = new THREE.Mesh(rockGeometry, rockMaterial);
                rock.position.set(
                    (Math.random() - 0.5) * 25,
                    -14.2 + Math.random() * 0.3,
                    (Math.random() - 0.5) * 20
                );
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                scene.add(rock);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // 水面波动
            if (water && water.geometry) {
                const positions = water.geometry.attributes.position;
                const original = water.userData.originalPositions;
                for (let i = 0; i < positions.count; i++) {
                    const x = original[i * 3];
                    const y = original[i * 3 + 1];
                    positions.setZ(i, Math.sin(x * 0.5 + time) * 0.2 + Math.sin(y * 0.5 + time * 1.2) * 0.15);
                }
                positions.needsUpdate = true;
            }

            // 泡泡上升
            bubbles.forEach((bubble, i) => {
                bubble.position.y += bubble.userData.speed;
                bubble.position.x += Math.sin(time * 2 + bubble.userData.wobble) * 0.005;
                bubble.position.z += Math.cos(time * 1.5 + bubble.userData.wobble) * 0.004;

                // 泡泡到顶后重置
                if (bubble.position.y > 9) {
                    bubble.position.y = -15;
                    bubble.position.x = (Math.random() - 0.5) * 30;
                    bubble.position.z = (Math.random() - 0.5) * 20;
                }
            });

            // 小鱼游动
            fishes.forEach((fish, i) => {
                fish.userData.direction += (Math.random() - 0.5) * 0.02;
                fish.position.x += Math.cos(fish.userData.direction) * fish.userData.speed;
                fish.position.z += Math.sin(fish.userData.direction) * fish.userData.speed;
                fish.position.y = fish.userData.originalY + Math.sin(time * 2 + i) * 0.3;

                fish.rotation.y = -fish.userData.direction + Math.PI;

                // 边界检查
                if (fish.position.x > 18) fish.userData.direction = Math.PI;
                if (fish.position.x < -18) fish.userData.direction = 0;
                if (fish.position.z > 15) fish.userData.direction = Math.PI / 2;
                if (fish.position.z < -15) fish.userData.direction = -Math.PI / 2;
            });

            // 粒子浮动
            const particles = scene.getObjectByName('particles');
            if (particles) {
                particles.rotation.y += 0.0003;
            }

            renderer.render(scene, camera);
        }

        function updateCamera() {
            camera.position.set(cameraOffsetX, 2 / cameraZoom, 10 / cameraZoom + cameraOffsetZ);
            camera.lookAt(cameraOffsetX, 0, cameraOffsetZ);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onWheel(e) {
            cameraZoom = Math.max(0.5, Math.min(3, cameraZoom - e.deltaY * 0.001));
            updateCamera();
        }

        // 计算两个触摸点之间的距离
        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // 鼠标/触摸事件处理
        function onMouseDown(e) {
            if (e.target.closest('.chat-area') || e.target.closest('.input-area') ||
                e.target.closest('.expanded-panel') || e.target.closest('.floating-menu-btn')) {
                return;
            }
            isDragging = true;
            lastMouseX = e.clientX || (e.touches && e.touches[0].clientX);
            lastMouseY = e.clientY || (e.touches && e.touches[0].clientY);
        }

        function onMouseMove(e) {
            if (!isDragging || isPinching) return;
            if (e.target.closest('.chat-area') || e.target.closest('.input-area') ||
                e.target.closest('.expanded-panel') || e.target.closest('.floating-menu-btn')) {
                return;
            }

            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);

            const deltaX = (clientX - lastMouseX) * 0.03 / cameraZoom;
            const deltaY = (clientY - lastMouseY) * 0.03 / cameraZoom;

            cameraOffsetX -= deltaX;
            cameraOffsetZ -= deltaY;

            // 限制移动范围
            cameraOffsetX = Math.max(-20, Math.min(20, cameraOffsetX));
            cameraOffsetZ = Math.max(-20, Math.min(20, cameraOffsetZ));

            updateCamera();

            lastMouseX = clientX;
            lastMouseY = clientY;
        }

        function onMouseUp() {
            isDragging = false;
        }

        // 触摸事件 - 双指缩放
        function onTouchStart(e) {
            if (e.touches.length === 2) {
                isPinching = true;
                isDragging = false;
                initialPinchDistance = getTouchDistance(e.touches);
                initialCameraZoom = cameraZoom;
            } else if (e.touches.length === 1) {
                onMouseDown(e);
            }
        }

        function onTouchMove(e) {
            if (e.touches.length === 2 && isPinching) {
                e.preventDefault();
                const currentDistance = getTouchDistance(e.touches);
                const scale = currentDistance / initialPinchDistance;
                cameraZoom = Math.max(0.5, Math.min(3, initialCameraZoom * scale));
                updateCamera();
            } else if (e.touches.length === 1) {
                onMouseMove(e);
            }
        }

        function onTouchEnd(e) {
            if (e.touches.length < 2) {
                isPinching = false;
            }
            if (e.touches.length === 0) {
                isDragging = false;
            }
        }

        function toggleMenu() {
            const btn = document.getElementById('menuBtn');
            const panel = document.getElementById('expandedPanel');
            btn.classList.toggle('active');
            panel.classList.toggle('show');
        }

        function updateCameraZoom(value) {
            cameraZoom = parseFloat(value);
            document.getElementById('cameraZoomValue').textContent = Math.round(value * 100) + '%';
            updateCamera();
        }

        // UI 功能
        function goBack() {
            window.location.href = 'home.html';
        }

        function switchRoom() {
            const mbti = getUrlParams();
            window.location.href = `chat-flower.html?mbti=${mbti}`;
        }

        // 统计消息数
        function incrementChatCount() {
            try {
                const savedUser = localStorage.getItem('mbtiUser');
                if (savedUser) {
                    const user = JSON.parse(savedUser);
                    if (user && user.account) {
                        const allStats = JSON.parse(localStorage.getItem('mbtiUserStats') || '{}');
                        if (!allStats[user.account]) {
                            allStats[user.account] = { friendCount: 0, chatCount: 0, onlineDays: 1 };
                        }
                        allStats[user.account].chatCount++;
                        localStorage.setItem('mbtiUserStats', JSON.stringify(allStats));
                    }
                }
            } catch (e) {}
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'bubble-message self';
            messageDiv.innerHTML = `
                <span class="bubble-avatar">🐳</span>
                <div class="bubble" style="animation-delay: ${Math.random() * 0.5}s;">
                    <div class="bubble-name">我</div>
                    <div class="bubble-text">${text}</div>
                </div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            input.value = '';

            // 增加消息统计
            incrementChatCount();

            // 同时在3D场景中添加一个大泡泡
            addUserBubble();
        }

        function addUserBubble() {
            const size = 0.4 + Math.random() * 0.2;
            const bubbleGeometry = new THREE.SphereGeometry(size, 24, 24);
            const bubbleMaterial = new THREE.MeshPhysicalMaterial({
                color: 0x00c0ff,
                transparent: true,
                opacity: 0.35,
                roughness: 0,
                metalness: 0.2,
                transmission: 0.85,
                thickness: 0.2
            });

            const bubble = new THREE.Mesh(bubbleGeometry, bubbleMaterial);
            bubble.position.set(
                (Math.random() - 0.5) * 10,
                -12,
                (Math.random() - 0.5) * 10
            );
            bubble.userData.speed = 0.035;
            bubble.userData.wobble = Math.random() * Math.PI * 2;
            bubble.userData.isUser = true;
            bubble.userData.life = 1000;

            bubbles.push(bubble);
            scene.add(bubble);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 从URL获取MBTI类型
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return params.get('mbti') || 'INFP';
        }

        function initRoom() {
            const mbti = getUrlParams();
            const mbtiData = {
                INTJ: { name: '战略家', desc: '高冷智慧的战略家们在海底相聚' },
                INTP: { name: '逻辑家', desc: '脑洞大开的思考者们在海底相聚' },
                ENTJ: { name: '统帅', desc: '气场全开的领导者们在海底相聚' },
                ENTP: { name: '辩论家', desc: '脑洞无限的辩论家们在海底相聚' },
                INFJ: { name: '洞察者', desc: '温柔治愈的洞察者们在海底相聚' },
                INFP: { name: '理想家', desc: '浪漫敏感的理想主义者们在海底相聚' },
                ENFJ: { name: '引导者', desc: '温暖包容的引导者们在海底相聚' },
                ENFP: { name: '逐梦者', desc: '热情活泼的逐梦者们在海底相聚' },
                ISTJ: { name: '检查者', desc: '严谨可靠的秩序者们在海底相聚' },
                ISFJ: { name: '守卫者', desc: '温暖贴心的守护者们在海底相聚' },
                ESTJ: { name: '管理者', desc: '规则至上的管理者们在海底相聚' },
                ESFJ: { name: '执政官', desc: '暖心社交的执政官们在海底相聚' },
                ISTP: { name: '鉴赏家', desc: '酷感实干的工匠们在海底相聚' },
                ISFP: { name: '探险家', desc: '温柔审美的艺术家们在海底相聚' },
                ESTP: { name: '企业家', desc: '热血行动的冒险家们在海底相聚' },
                ESFP: { name: '表演者', desc: '派对中心的表演者们在海底相聚' }
            };

            const data = mbtiData[mbti] || mbtiData.INFP;
            document.getElementById('roomTitle').textContent = `🌊 ${mbti} 海水聊天室`;
            document.getElementById('roomSubtitle').textContent = data.desc;
        }

        initThree();
        initRoom();

        // 初始化UI显示
        document.getElementById('depthFill').style.height = depth + '%';
        document.getElementById('depthText').textContent = Math.round(depth) + '米';
        document.getElementById('cameraZoom').value = cameraZoom;
        document.getElementById('cameraZoomValue').textContent = Math.round(cameraZoom * 100) + '%';

        // 深度调节
        let isAdjustingDepth = false;
        document.addEventListener('wheel', (e) => {
            if (e.target.closest('.expanded-panel')) {
                depth = Math.max(10, Math.min(100, depth + e.deltaY * 0.05));
                document.getElementById('depthFill').style.height = depth + '%';
                document.getElementById('depthText').textContent = Math.round(depth) + '米';
            }
        }, { passive: true });
    </script>
</body>
