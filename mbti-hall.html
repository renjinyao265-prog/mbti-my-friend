<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 交友大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* 背景层 */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #2d1b4e 0%, #4a2c7a 30%, #6b3fa0 60%, #8b5fc0 100%);
            z-index: 0;
        }

        /* 星光粒子 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 顶部标题 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .header h1 {
            color: #fff;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            letter-spacing: 8px;
        }

        /* 星球容器 */
        .planets-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        /* 星球基础样式 */
        .planet {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .planet:hover {
            z-index: 50;
        }

        .planet-label {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            color: #fff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .planet:hover .planet-label {
            opacity: 1;
        }

        /* ============ NT 分析家组 ============ */

        /* INTJ 紫晶暗核星 */
        .planet.intj {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #a060ff 0%, #6b3fa0 30%, #4a2c7a 60%, #2d1b4e 100%);
            box-shadow: 0 0 20px rgba(160, 96, 255, 0.4), inset 0 0 15px rgba(0,0,0,0.3);
            border: 2px solid #c0c0c0;
            animation: float-slow 20s infinite ease-in-out, rotate-slow 40s infinite linear;
        }
        .planet.intj::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #d0a0ff;
            border-radius: 50%;
            box-shadow: 0 0 15px #d0a0ff, 0 0 30px #a060ff;
            animation: pulse 3s infinite ease-in-out;
        }
        .planet.intj::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 1px dashed rgba(192,192,192,0.3);
            border-radius: 50%;
        }
        .planet.intj:hover {
            transform: scale(1.15);
            box-shadow: 0 0 40px rgba(160, 96, 255, 0.8);
        }

        /* INTP 星尘逻辑星 */
        .planet.intp {
            width: 85px;
            height: 95px;
            border-radius: 45% 55% 50% 50%;
            background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.9) 0%, #c0e0ff 30%, #a0d0ff 60%, #80b0e0 100%);
            box-shadow: 0 0 25px rgba(160, 208, 255, 0.5);
            opacity: 0.9;
            animation: float-wobble 18s infinite ease-in-out;
        }
        .planet.intp::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #b0e0ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #80c0ff;
            animation: pulse 4s infinite ease-in-out;
        }
        .planet.intp:hover {
            transform: scale(1.15);
            opacity: 1;
        }

        /* ENTJ 金焰统帅星 */
        .planet.entj {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff0a0 0%, #ffd040 25%, #ffb020 50%, #ff8000 100%);
            box-shadow: 0 0 30px rgba(255, 176, 32, 0.7), inset 0 0 20px rgba(255,255,255,0.3);
            animation: float-fast 15s infinite ease-in-out, rotate-slow 25s infinite linear;
        }
        .planet.entj::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff0a0, 0 0 40px #ffd040;
            animation: pulse-fast 1.5s infinite ease-in-out;
        }
        .planet.entj::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 15px solid #ffd040;
            filter: drop-shadow(0 0 5px #ffd040);
        }
        .planet.entj:hover {
            transform: scale(1.15);
            box-shadow: 0 0 50px rgba(255, 176, 32, 0.9);
        }

        /* ENTP 奇想流星星 */
        .planet.entp {
            width: 80px;
            height: 95px;
            border-radius: 50% 50% 40% 60% / 60% 60% 40% 40%;
            background: radial-gradient(ellipse at 30% 30%, #fff 0%, #ffffa0 20%, #d0ff80 50%, #80ffb0 100%);
            box-shadow: 0 0 25px rgba(208, 255, 128, 0.6);
            animation: float-zigzag 16s infinite ease-in-out;
        }
        .planet.entp::before {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 20%;
            width: 60%;
            height: 40px;
            background: linear-gradient(to bottom, rgba(208,255,128,0.8), transparent);
            border-radius: 50%;
            filter: blur(5px);
        }
        .planet.entp::after {
            content: '';
            position: absolute;
            top: 25%;
            left: 30%;
            width: 6px;
            height: 6px;
            background: #000;
            border-radius: 50%;
            box-shadow: 15px 0 0 #000;
        }
        .planet.entp:hover {
            transform: scale(1.15);
        }

        /* ============ NF 外交家组 ============ */

        /* INFJ 粉雾共情星 */
        .planet.infj {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #fff0f5 0%, #ffd0e0 30%, #e0b0d0 60%, #d0a0c0 100%);
            box-shadow: 0 0 30px rgba(255, 208, 224, 0.6);
            animation: float-breathing 17s infinite ease-in-out;
        }
        .planet.infj::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 13px;
            height: 13px;
            background: #ffd0e0;
            border-radius: 50%;
            box-shadow: 0 0 15px #ffb0d0;
            animation: pulse 3.5s infinite ease-in-out;
        }
        .planet.infj:hover {
            transform: scale(1.1);
        }

        /* INFP 幻梦琉璃星 */
        .planet.infp {
            width: 85px;
            height: 85px;
            border-radius: 45% 55% 42% 58% / 52% 48% 55% 45%;
            background: linear-gradient(135deg, #e0b0ff 0%, #ffb0d0 30%, #b0d0ff 60%, #c0f0ff 100%);
            box-shadow: 0 0 25px rgba(224, 176, 255, 0.6);
            opacity: 0.9;
            animation: float-gentle 22s infinite ease-in-out, rotate-slow 50s infinite linear;
        }
        .planet.infp::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #fff0ff;
            border-radius: 50%;
            box-shadow: 0 0 15px #e0b0ff;
            animation: pulse 4s infinite ease-in-out;
        }
        .planet.infp:hover {
            transform: scale(1.15);
            opacity: 1;
        }

        /* ENFJ 青空引导星 */
        .planet.enfj {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #fff 0%, #d0f0ff 30%, #a0d0ff 60%, #80b0e0 100%);
            box-shadow: 0 0 30px rgba(160, 208, 255, 0.6);
            animation: float-slow 24s infinite ease-in-out, rotate-slow 45s infinite linear;
        }
        .planet.enfj::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: #d0f0ff;
            border-radius: 50%;
            box-shadow: 0 0 20px #a0d0ff;
            animation: pulse 3.5s infinite ease-in-out;
        }
        .planet.enfj:hover {
            transform: scale(1.1);
        }

        /* ENFP 橙光逐梦星 */
        .planet.enfp {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff0e0 0%, #ffd080 25%, #ffb060 50%, #ff9040 100%);
            box-shadow: 0 0 35px rgba(255, 176, 96, 0.7);
            animation: float-bouncy 14s infinite ease-in-out;
        }
        .planet.enfp::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 17px;
            height: 17px;
            background: #fff0a0;
            border-radius: 50%;
            box-shadow: 0 0 25px #ffd040;
            animation: pulse-fast 2s infinite ease-in-out;
        }
        .planet.enfp::after {
            content: '';
            position: absolute;
            top: -5px;
            left: 15px;
            width: 20px;
            height: 25px;
            background: radial-gradient(circle at 50% 60%, #ffb0c0 0%, #ff90a0 100%);
            border-radius: 50% 50% 50% 50%;
            box-shadow: 50px 0 0 #ffb0c0;
        }
        .planet.enfp:hover {
            transform: scale(1.15);
        }

        /* ============ SJ 守护者组 ============ */

        /* ISTJ 青岩秩序星 */
        .planet.istj {
            width: 95px;
            height: 95px;
            border-radius: 12%;
            background: radial-gradient(circle at 35% 35%, #a0c0a0 0%, #709070 30%, #507050 60%, #305030 100%);
            box-shadow: 0 0 25px rgba(112, 144, 112, 0.6);
            animation: float-slow 25s infinite ease-in-out, rotate-slow 60s infinite linear;
        }
        .planet.istj::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #c0e0c0;
            border-radius: 50%;
            box-shadow: 0 0 12px #a0c0a0;
            animation: pulse 4s infinite ease-in-out;
        }
        .planet.istj:hover {
            transform: scale(1.1);
        }

        /* ESTJ 紫晶规则星 */
        .planet.estj {
            width: 100px;
            height: 100px;
            border-radius: 15%;
            background: radial-gradient(circle at 35% 35%, #e0d0ff 0%, #c0a0ff 30%, #a070e0 60%, #8050c0 100%);
            box-shadow: 0 0 30px rgba(160, 112, 224, 0.7);
            animation: float-slow 22s infinite ease-in-out, rotate-slow 35s infinite linear;
        }
        .planet.estj::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 11px;
            height: 11px;
            background: #d0c0ff;
            border-radius: 50%;
            box-shadow: 0 0 15px #c0a0ff;
            animation: pulse 3.5s infinite ease-in-out;
        }
        .planet.estj::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 2px solid rgba(192,192,192,0.5);
            border-radius: 10%;
        }
        .planet.estj:hover {
            transform: scale(1.1);
        }

        /* ISFJ 奶白守护星 */
        .planet.isfj {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #fff 0%, #fff5e0 30%, #f0e0c0 60%, #e0d0b0 100%);
            box-shadow: 0 0 30px rgba(255, 245, 224, 0.7);
            animation: float-gentle 20s infinite ease-in-out;
        }
        .planet.isfj::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 13px;
            height: 13px;
            background: #fff5e0;
            border-radius: 50%;
            box-shadow: 0 0 18px #ffe0b0;
            animation: pulse 3.8s infinite ease-in-out;
        }
        .planet.isfj:hover {
            transform: scale(1.1);
        }

        /* ESFJ 浅蓝暖心星 */
        .planet.esfj {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #fff 0%, #d0efff 30%, #a0d0ff 60%, #ffd0e0 100%);
            box-shadow: 0 0 35px rgba(160, 208, 255, 0.7);
            animation: float-wobble 18s infinite ease-in-out;
        }
        .planet.esfj::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 15px;
            height: 15px;
            background: #ffd0e0;
            border-radius: 50%;
            box-shadow: 0 0 20px #ffb0d0;
            animation: pulse 3s infinite ease-in-out;
        }
        .planet.esfj::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            background: #ffb0c0;
            border-radius: 50%;
            transform: translate(-100%, -90%) scale(0.4);
            box-shadow: 60px 0 0 #ffb0c0, 30px -50px 0 #ffb0c0, 30px 50px 0 #ffb0c0;
            opacity: 0.8;
        }
        .planet.esfj:hover {
            transform: scale(1.1);
        }

        /* ============ SP 探险家组 ============ */

        /* ISTP 银械工匠星 */
        .planet.istp {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #e0e0e0 0%, #c0c0c0 30%, #a0a0a0 60%, #606080 100%);
            box-shadow: 0 0 25px rgba(160, 160, 160, 0.6);
            animation: float-slow 23s infinite ease-in-out, rotate-slow 30s infinite linear;
        }
        .planet.istp::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #d0c0a0;
            border-radius: 50%;
            box-shadow: 0 0 12px #c0b0a0;
            animation: pulse 3.8s infinite ease-in-out;
        }
        .planet.istp:hover {
            transform: scale(1.1);
        }

        /* ISFP 薄荷艺术星 */
        .planet.isfp {
            width: 85px;
            height: 88px;
            border-radius: 48% 52% 45% 55% / 55% 45% 52% 48%;
            background: linear-gradient(135deg, #b0f0d0 0%, #d0b0ff 30%, #ffb0d0 60%, #b0e0ff 100%);
            box-shadow: 0 0 28px rgba(176, 240, 208, 0.7);
            opacity: 0.92;
            animation: float-gentle 21s infinite ease-in-out, rotate-slow 55s infinite linear;
        }
        .planet.isfp::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #d0fff0;
            border-radius: 50%;
            box-shadow: 0 0 15px #b0f0d0;
            animation: pulse 4.2s infinite ease-in-out;
        }
        .planet.isfp:hover {
            transform: scale(1.15);
            opacity: 1;
        }

        /* ESTP 赤焰冒险家星 */
        .planet.estp {
            width: 95px;
            height: 90px;
            border-radius: 50% 50% 45% 55% / 60% 60% 40% 40%;
            background: radial-gradient(ellipse at 60% 40%, #fff0a0 0%, #ff8040 30%, #ff4020 60%, #c02010 100%);
            box-shadow: 0 0 35px rgba(255, 128, 64, 0.8);
            animation: float-zigzag 15s infinite ease-in-out;
        }
        .planet.estp::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: #fff0a0;
            border-radius: 50%;
            box-shadow: 0 0 25px #ff8040;
            animation: pulse-fast 1.8s infinite ease-in-out;
        }
        .planet.estp::after {
            content: '';
            position: absolute;
            left: -25px;
            top: 30%;
            width: 40px;
            height: 50px;
            background: linear-gradient(to left, rgba(255,128,64,0.8), transparent);
            border-radius: 50%;
            filter: blur(5px);
        }
        .planet.estp:hover {
            transform: scale(1.15);
        }

        /* ESFP 炫彩派对表演星 */
        .planet.esfp {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff0ff 0%, #ff80c0 30%, #d040a0 60%, #a02080 100%);
            box-shadow: 0 0 40px rgba(255, 128, 192, 0.8);
            animation: float-bouncy 13s infinite ease-in-out, rotate-slow 28s infinite linear;
        }
        .planet.esfp::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            background: #fff0a0;
            border-radius: 50%;
            box-shadow: 0 0 30px #ffd040;
            animation: pulse-fast 2s infinite ease-in-out;
        }
        .planet.esfp:hover {
            transform: scale(1.15);
            box-shadow: 0 0 60px rgba(255, 128, 192, 1);
        }

        /* ============ 动画关键帧 ============ */
        @keyframes float-slow {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(15px, -10px); }
            50% { transform: translate(-10px, 15px); }
            75% { transform: translate(-15px, -5px); }
        }
        @keyframes float-fast {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(20px, -15px); }
            50% { transform: translate(-15px, 20px); }
            75% { transform: translate(-20px, -10px); }
        }
        @keyframes float-gentle {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(10px, -8px) scale(1.02); }
            66% { transform: translate(-8px, 10px) scale(0.98); }
        }
        @keyframes float-wobble {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(12px, -8px) rotate(2deg); }
            40% { transform: translate(-8px, 12px) rotate(-2deg); }
            60% { transform: translate(-12px, -6px) rotate(1deg); }
            80% { transform: translate(8px, 8px) rotate(-1deg); }
        }
        @keyframes float-zigzag {
            0%, 100% { transform: translate(0, 0); }
            15% { transform: translate(25px, -10px); }
            35% { transform: translate(-15px, 20px); }
            55% { transform: translate(-25px, -15px); }
            75% { transform: translate(15px, 10px); }
        }
        @keyframes float-bouncy {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(8px, -18px); }
            40% { transform: translate(-12px, 8px); }
            60% { transform: translate(-5px, -12px); }
            80% { transform: translate(15px, 5px); }
        }
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
        }
        @keyframes pulse-fast {
            0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
        }
        @keyframes float-breathing {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5px, -5px) scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="space-bg" id="spaceBg"></div>

    <div class="header">
        <h1>MBTI 交友大厅</h1>
    </div>

    <div class="planets-container" id="planetsContainer"></div>

    <script>
        // 16型MBTI星球数据
        const planetsData = [
            { type: 'intj', name: 'INTJ', title: '战略家 · 暗核智慧' },
            { type: 'intp', name: 'INTP', title: '逻辑家 · 星尘脑洞' },
            { type: 'entj', name: 'ENTJ', title: '统帅 · 气场全开' },
            { type: 'entp', name: 'ENTP', title: '辩论家 · 脑洞无限' },
            { type: 'infj', name: 'INFJ', title: '洞察者 · 温柔共情' },
            { type: 'infp', name: 'INFP', title: '理想家 · 幻梦琉璃' },
            { type: 'enfj', name: 'ENFJ', title: '引导者 · 温暖包容' },
            { type: 'enfp', name: 'ENFP', title: '逐梦者 · 热情向阳' },
            { type: 'istj', name: 'ISTJ', title: '检查者 · 青岩秩序' },
            { type: 'estj', name: 'ESTJ', title: '管理者 · 规则至上' },
            { type: 'isfj', name: 'ISFJ', title: '守卫者 · 奶白守护' },
            { type: 'esfj', name: 'ESFJ', title: '执政官 · 暖心社交' },
            { type: 'istp', name: 'ISTP', title: '鉴赏家 · 银械工匠' },
            { type: 'isfp', name: 'ISFP', title: '探险家 · 薄荷艺术' },
            { type: 'estp', name: 'ESTP', title: '企业家 · 赤焰冒险' },
            { type: 'esfp', name: 'ESFP', title: '表演者 · 派对中心' }
        ];

        // 创建星光
        function createStars() {
            const bg = document.getElementById('spaceBg');
            const starCount = 150;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                bg.appendChild(star);
            }
        }

        // 创建星球
        function createPlanets() {
            const container = document.getElementById('planetsContainer');
            const padding = 80;

            planetsData.forEach((planet, index) => {
                const planetEl = document.createElement('div');
                planetEl.className = `planet ${planet.type}`;

                // 随机位置（避开边缘）
                const x = padding + Math.random() * (window.innerWidth - padding * 2 - 120);
                const y = padding + 60 + Math.random() * (window.innerHeight - padding * 2 - 180);

                planetEl.style.left = x + 'px';
                planetEl.style.top = y + 'px';
                planetEl.style.animationDelay = (index * 0.5) + 's';

                // 标签
                const label = document.createElement('div');
                label.className = 'planet-label';
                label.textContent = `${planet.name} ${planet.title}`;
                planetEl.appendChild(label);

                // 点击事件
                planetEl.addEventListener('click', () => {
                    window.location.href = `chat-flower.html?mbti=${planet.name.toUpperCase()}`;
                });

                container.appendChild(planetEl);
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            createPlanets();
        });
    </script>
</body>
</html>
