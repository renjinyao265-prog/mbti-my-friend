<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 交友云</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #a0c0ff 0%, #c0d0ff 50%, #e0e0ff 100%);
            overflow-y: auto;
            padding-bottom: 80px;
        }

        /* 页面内容 */
        .page-content {
            padding-top: 20px;
            padding-bottom: 20px;
        }

        /* 顶部标题 */
        .header {
            text-align: center;
            padding: 25px 20px 15px;
        }

        .header h1 {
            color: #3a4a7a;
            font-size: 1.8rem;
            letter-spacing: 6px;
            margin-bottom: 5px;
        }

        .header p {
            color: #6a7aaa;
            font-size: 14px;
        }

        /* 在线统计 */
        .stats-bar {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(15px);
            margin: 0 20px 20px;
            padding: 15px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.8);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #6080ff;
        }

        .stat-label {
            font-size: 12px;
            color: #7a8aaa;
            margin-top: 2px;
        }

        /* 用户网格 */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 20px;
        }

        @media (min-width: 600px) {
            .users-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 900px) {
            .users-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .user-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 8px 25px rgba(100,120,200,0.15);
            transition: all 0.3s ease;
        }

        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(100,120,200,0.25);
        }

        .user-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6080ff, #a0c0ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 12px;
            box-shadow: 0 5px 15px rgba(96,128,255,0.3);
        }

        .user-name {
            font-size: 16px;
            font-weight: 600;
            color: #3a4a7a;
            margin-bottom: 4px;
        }

        .user-mbti {
            display: inline-block;
            background: linear-gradient(135deg, rgba(96,128,255,0.15), rgba(160,192,255,0.15));
            color: #6080ff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .user-status {
            font-size: 12px;
            color: #40c080;
        }

        .user-status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #40c080;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse-status 2s infinite;
        }

        @keyframes pulse-status {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .user-bio {
            font-size: 12px;
            color: #8a9aba;
            margin-top: 8px;
            line-height: 1.4;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7a8aaa;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(100,120,200,0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #8a9aba;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(96,128,255,0.08);
        }

        .nav-item.active {
            color: #6080ff;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #6080ff, transparent);
            border-radius: 0 0 3px 3px;
        }

        .nav-item-icon {
            font-size: 22px;
            margin-bottom: 3px;
        }

        .nav-item-text {
            font-size: 11px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="page-content">
        <div class="header">
            <h1>👥 交友云</h1>
            <p>发现同频的星球伙伴</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="onlineCount">0</div>
                <div class="stat-label">在线用户</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">注册用户</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">16</div>
                <div class="stat-label">MBTI类型</div>
            </div>
        </div>

        <div class="users-grid" id="usersGrid"></div>
    </div>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <span class="nav-item-icon">🌍</span>
            <span class="nav-item-text">星球大厅</span>
        </a>
        <a href="friend.html" class="nav-item active">
            <span class="nav-item-icon">👥</span>
            <span class="nav-item-text">交友云</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-item-icon">👤</span>
            <span class="nav-item-text">个人中心</span>
        </a>
    </nav>

    <script>
        const sampleUsers = [
            { id: '1', nickname: '星尘旅者', mbti: 'INFP', avatar: '🦋', bio: '喜欢在星空下做梦的理想主义者' },
            { id: '2', nickname: '智慧观察者', mbti: 'INTJ', avatar: '🦉', bio: '高冷但内心温暖的战略家' },
            { id: '3', nickname: '逻辑玩家', mbti: 'INTP', avatar: '🧩', bio: '永远在思考为什么的逻辑家' },
            { id: '4', nickname: '阳光领袖', mbti: 'ENTJ', avatar: '🦁', bio: '气场全开，天生的领导者' },
            { id: '5', nickname: '创意无限', mbti: 'ENTP', avatar: '🎪', bio: '脑洞比宇宙还大的辩论家' },
            { id: '6', nickname: '温柔治愈', mbti: 'INFJ', avatar: '🌸', bio: '能读懂你内心的洞察者' },
            { id: '7', nickname: '热情小太阳', mbti: 'ENFP', avatar: '🌻', bio: '永远充满活力的逐梦者' },
            { id: '8', nickname: '温暖引导', mbti: 'ENFJ', avatar: '🌟', bio: '像阳光一样温暖的引导者' },
            { id: '9', nickname: '严谨守护者', mbti: 'ISTJ', avatar: '📚', bio: '可靠又安心的检查者' },
            { id: '10', nickname: '贴心守护', mbti: 'ISFJ', avatar: '☕', bio: '默默守护你的守卫者' },
            { id: '11', nickname: '规则至上', mbti: 'ESTJ', avatar: '📋', bio: '井井有条的管理者' },
            { id: '12', nickname: '社交达人', mbti: 'ESFJ', avatar: '🎀', bio: '暖心又社交的执政官' },
            { id: '13', nickname: '酷感工匠', mbti: 'ISTP', avatar: '🔧', bio: '动手能力超强的鉴赏家' },
            { id: '14', nickname: '艺术美学', mbti: 'ISFP', avatar: '🎨', bio: '温柔又审美的探险家' },
            { id: '15', nickname: '热血冒险家', mbti: 'ESTP', avatar: '🏃', bio: '永远在行动的企业家' },
            { id: '16', nickname: '派对中心', mbti: 'ESFP', avatar: '🎉', bio: '哪里有我哪里就有派对的表演者' }
        ];

        function getAccounts() {
            try {
                const accounts = JSON.parse(localStorage.getItem('mbtiAccounts') || '[]');
                return accounts.length > 0 ? accounts : sampleUsers;
            } catch (e) {
                return sampleUsers;
            }
        }

        function renderUsers() {
            const grid = document.getElementById('usersGrid');
            const accounts = getAccounts();

            document.getElementById('onlineCount').textContent = Math.max(1, Math.min(accounts.length, 8));
            document.getElementById('totalCount').textContent = accounts.length;

            if (accounts.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">☁️</div>
                        <p>暂时还没有用户，快来第一个加入吧！</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = accounts.map(user => `
                <div class="user-card">
                    <div class="user-avatar">${user.avatar || '🌟'}</div>
                    <div class="user-name">${user.nickname || '神秘用户'}</div>
                    <div class="user-mbti">${user.mbti || 'MBTI'}</div>
                    <div class="user-status">在线</div>
                    ${user.bio ? `<div class="user-bio">${user.bio}</div>` : ''}
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderUsers();
        });
    </script>
</body>
</html>
